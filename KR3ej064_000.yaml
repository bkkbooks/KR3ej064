front:
  text: 陸序生人之害痘疹最酷而又為盡人之所不能免諺語目痘為關固非惟暴之云直欲判人鬼耳蓋不獲生入玉門者多矣傷哉江右喻嘉言先生擅和緩之能而於痘科尤加意無已經其治者業莫不生死而肉骨又著為此書以昭示來茲誠保赤之金丹壽千百世而無窮也其書流傳至吳下得之者均私為枕中秘匿不以示人此大非先生濟世之本心矣今春坊友用重值購得將付剞劂丐序於余余甚善其能成先生之志並竭弩鈍附入數則而歸之時乾隆壬辰夏日古瀛陸師鑑聖蒼氏題
  hash: sha256:5648a5ab14fbf8aaf60341c7f41a49f04a62dc54d1ddd0ebfb84ec2e78a6ad68
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3ej064_jc_000-d2.h1s1}
body:
  text: 面部吉凶圖引痘疹原於五臟所屬何經是分症之輕重故其達乎面部耳目口鼻顴腮各部位既皆分配交隸乎心肝脾肺腎則見點之處孰吉孰凶昭然若揭不有可披圖而指數者乎藏府所屬部分額中為庭兩眉之間曰闕直鼻而下曰直下兩目之間曰下極鼻隊曰方鼻柱之端曰面黃自額而下闕上屬首面咽喉之部分自闕中循鼻而下鼻端屬肺心肝脾腎之部分自目眥挾鼻而下承漿膽胃大小腸膀胱之部分自顴而下頰屬肩背手臂之部分牙車斜下頤屬股膝脛足之部分經曰五臟次於中央六腑夾其面側首面上於闕庭王宮在於下極正謂此也五臟為人身之主故位在中央膽胃大小腸膀胱為五臟之府故夾其兩側由藏府以及於四肢故循至䪼及頰以屬肩背臂手股膝脛足也上以閱上下以閱下上下之分然亦藏府之定位故也錢氏曰囟門屬腎髮際屬膀胱左風池屬肝右風池屬命門左太陽屬膀胱右太陰屬腎印堂屬心風池至山根屬肺心與肝山根至鼻端屬肝脾腎人中至承漿屬脾耳前與承漿屬腎左腮屬肝右腮屬肺額上屬心鼻屬脾頤屬腎頭面形色主病左腮青為順白為逆赤主肝經風熱發熱拘急青黑主驚風腹痛淡赤主潮熱痰嗽右腮白為順赤為逆赤甚主喘急悶亂飲水小便赤澀淋閉額色赤為順黑為逆青黑主驚風腹痛瘛瘲啼哭微黃主盜汗毛焦驚疳眥熱鼻色黃為順青為逆青主脾經虛熱飲食少思深黃主小便秘鼻燥衄血顏色黑為順黃為逆色赤主腎與膀胱有熱小便秘塞唇四圍白黃色者脾弱也青者肝勝也青黃不澤木剋土也青黑相兼木火風熱也黑者寒水侮土也白者氣虛也囟門紅主胎中受熱受驚不時驚跳啾唧夜啼紅而腫起由風熱上衝主心胸有熱痰主驚囟陷主胃氣下陷泄瀉虛弱久病囟門紅印堂青此心之微邪侮水也囟印皆紅亦然囟門青印堂紅此水剋火危囟印皆青亦然額上紅脈至眉心主風熱搐搦發熱小便赤色印堂紅主心經積熱眉心連印堂紅主心肺上焦有熱痰夜啼嘔吐生驚闕中青紫主傷風咳嗽痰涎印堂紅脈至山根是心與小腸俱熱主小便赤色驚悸咬牙山根下青紫主飲食傷脾肚痛印堂至準頭紅主五臟內熱印堂青主風熱主驚黑主腹痛啼哭山根至鼻柱紅是心脾胃有熱主大小便赤澀山根青主驚山根紫傷乳食山根赤黑主吐瀉年壽紅黑主痢痰黃赤並吐瀉左太陽並日角紅主傷風寒壯熱煩躁啼叫太陽紅脈至太陰主內外有熱連文臺則熱極不解至武臺則漸生變左太陽青主變蒸太陰紅脈見主壯熱鼻塞傷風左太陰紫傷寒有感左太陰紅至太陽因吃母熱病乳主痰左太陰青生驚日角紅至眉中主內熱生驚文臺紅傷寒內熱頭痛左文臺紫久熱不退青主熱傳經不解左眉頭紅主肝熱近眉頭左下突起主伏驚不時驚跳兩眉頭紅主夜啼風池紅主夜啼驚悸不得安臥黃主吐逆眼胞腫主濕痰咳嗽黑睛黃傷寒白輪黃傷積青肝熱赤心黑淡紅心虛氣池紅三焦有熱紫主夜啼睡臥不寧黑主中焦有痰風池氣池俱紅主煩躁啼叫武臺紅吐泄生驚年壽至氣池青紫主風熱顛癇耳後高骨起青筋主癇瘛人中黃傷食吐瀉黑腹痛或蟲或痢承漿黃吐青驚明醫雜著云小兒之疾惟肝與脾為病最多以肝素有餘脾素不足也診視之法唇黃多積唇白多虛唇燥多熱唇紫積熱唇四圍青主木剋土驚氣入腹耳輪紅紫主麻痘毛髮乾焦主疳積睛黃傷寒睛青肝經風熱白睛黃脾經濕熱睛藍胎氣不足淡紅色心經虛熱無睛光者腎虛通身皆熱是傷寒肚熱腳冷是傷食內熱手足心必熱內寒手足心必寒叫呼冷汗出者蟲所齧也唇青不欲食者木剋土也怕明者心經熱甚昏睡者食熱在脾停耳者腎有風毒噫氣者胃虛積聚耳出膿水者心之疳涎流唇紫者蛔之積解顱者腎氣不足滯頤脾胃虛寒心氣大驚則生顛疾心氣虛乏因少精神龜背者風客脊髓龜胸者熱蓄肺經鵝口口瘡胃中濕熱重舌木舌熱蘊心脾臍風撮口濕熱風痰胎熱黃病由濕熱身熱攢眉頭目必痛不食攢眉下痢腹疼哭而不啼必有所痛啼而不哭或因於驚天釣心肺積熱內釣脾胃虛寒夜啼有寒熱之分驚症有急慢之別渴則唇紅餂舌熱則眼澀朦隴細心詳察百證自明凡小兒臍帶短者多難養臍帶上多壘塊者多兄弟無壘塊者無兄弟
