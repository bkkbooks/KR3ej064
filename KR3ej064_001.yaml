body:
  text: 上卷痘疹原委夫小兒痘疹乃五臟六腑胎養穢液之毒留於命門之內發於肌肉之間人生無不種者痘未出之時證類傷寒憎寒壯熱身體疼痛唇臉俱紅耳尻骨指尖俱冷或腹痛頭疼眼澀鼻塞唇焦氣促口生黏痰大便黃稠是其證也但治法與傷寒不同傷寒由表入里痘疹從里出表歸重脾肺二經內經曰脾主肌肉肺生皮毛滋養氣血使脾不虛肺不寒表裡中和其痘易出自然靨也痘證最為酷證不日之間生死反掌逢歲火毒流行一發則遍身為之斑爛惟火降水盛而不焦者吉痘初起腰疼點見焦黑者死蓋緣毒氣留於腎間熱壯水枯而不發越故耳錢氏雖有百祥丸下之十無一生其丸太峻故不敢用愚用透肌解毒化毒解肌等湯代之全活者甚衆凡痘宜發越不宜菀滯宜紅活凸綻不宜紫黑陷伏治法無多術在察色觀證辨的表裡寒熱虛實而已凡治痘之法當於三日已未見紅點之時宜升麻湯參蘇飲之類以和其表微汗為度若未汗而表未解略見紅點隱約於肌肉之間則四物十神湯透肌之劑便當施治凡見出遲發慢根窩缺紅活便當用心調理切勿袖手待斃況古人用藥如陳文中之木香異攻散用丁桂香附峻熱之藥與內經病機不合丹溪曾發揮其誤亦有用當者屢獲奇效若劉河間張子和用大黃芩連寒涼之劑丹溪曰酒炒黃連能解痘毒依憑用之而獲效者不少今之依陳氏而治者多用熱藥宗張劉而治者多用涼劑是故不偏於熱而偏於寒此刻舟求劍之道也按內經曰寒者溫之熱者清之甚者從之微者逆之又曰逆者正治從者反治陳氏用從治之法權也劉張用正治之法常也皆不外於參耆歸術補氣血等藥為主學者當看時令寒熱緩急而治不可執一見也凡痘初起之時有因傷寒而得有因時氣傳染而得有因傷食發熱嘔吐而得有因跌僕驚恐畜血而得是以一人受病傳及其餘或為目竄驚搐如風之狀或口舌咽喉腹痛或煩躁狂悶昏睡或自汗或下利或發熱或不發熱證候多端即以耳居指尖俱冷為驗亦未盡信苟一二日外腎之部位俱熱從何稽考不若驗其兩目畏燈唇帶黑暈舌生白胎者為真預防調理痘疹一事人生未有或免調理亦宜預防一遇鄉鄰有種痘而值天時不正即宜避風寒節飲食戒嗜欲倘一失調為患非小古人所以調於未種之先幼幼之心為至切矣古方用油飲子稀痘散三豆散不換正氣散闢穢丹及瑣瑣葡萄皆能獲效然未盡美愚立一方名曰預防湯獲效頗多録示同志油飲子治痘未種之先用麻油一斤將鐵鍋熬成膏瓷罐盛貯每早用百沸湯一盞化一匙溫服稀痘散治痘欲出未出之時用經霜老絲瓜近蒂三寸連皮子燒灰存性陳蜜為丸如桐子大硃砂為衣蜜湯送下三十丸多者減少少者益稀三豆散治同上赤豆黃豆大黑豆各一升淘淨用水八升同甘草三兩煮豆成膏為度每日任意隨時服之甚妙不換正氣散治天時不正厚朴藿香甘草半夏蒼朮陳皮川芎白芷防風各等分姜三片棗一枚水煎服闢穢丹蒼朮細辛川芎甘松乳香沒藥真降香共為細末痘未種之時備之既種之時焚之瑣瑣葡萄出安南國及雲南夷方其色紅紫狀如甘枸杞而小難得真預防湯治痘未出時痘疫鄉里盛行宜一日一服神效山楂生地為君歸通蒡苓為佐防風芥穗連翹白芷陳皮甘草各三分當歸木通茯苓各八分白芍五分白朮川芎升麻各三分山楂牛蒡各七分生地一錢銀花五分加燈心水煎服一凡痘症防火症初起或半日一二日內太陽無汗熱壯點見者毒氣乘熱侵於陽位急宜取汗退火以清肌膚庶幾減少緩則血隨熱旺紅侵清膚內密如蠶種為郁苗若投以保元太和雞湯異攻參耆生脈之類則熱益盛而火愈熾至五日內束手待斃未有能生者噫非痘殃人也醫殃人也特揭篇端以濟世云諸儒論王氏指迷論云痘疹乃時氣之一端一人受症傳及其餘又曰痘疹有熱則易出一出則遍身為之斑爛張氏煥曰痘子氣均則出快蓋血隨氣行氣逆則血滯王氏惟一曰痘者脾土所生肝木旺則能勝土熱動心神而生驚錢氏聞禮曰肝風心火二臟交爭而發搐又曰痘未形而先發搐大忌涼心蓋瘡屬心心生血心涼則血不能行痘欲出而不能得也切宜慎之大抵治驚當平肝利小便均氣最妙仁齊楊氏曰大熱當利小便宜五苓散導赤散小熱宜消毒飲四聖散之類丹溪先生曰諸痛屬熱為實宜酒炒芩連荊防解毒藥加升麻芷葛之類諸癢屬寒為虛宜歸地芎芍參耆養血氣藥加升葛之類愚謂便表裡虛實是觀症也涼血解毒安表和中是善治也舍此治法雖多反為逆途又曰丹溪為活血調氣安來和中此為虛實而言不若涼血解毒安表和中為當活血調氣則又先以補助之法遏虛寒則可遇熱症則危又曰善治痘者辨其寒熱泄其毒自內出治於已然者也禁其寒自內出治於未然者也治於未然者易為力治於已然者難為功夫熱盛則毒多苟不和解以泄其熱則血熱妄行不居原位是猶溪水橫行泛濫瀰漫宜決壅塞以行疏利之法毒氣有所自出矣若誤而投以熱藥與塞水何異辨五臟死症經曰足厥陰肝屬木賴腎水以為生腎水竭則肝絶心乃肝之子舌乃心之苗外症舌青黑而卷目無精光淚出不止而交流逢庚辛日死經曰手少陰心屬火賴肝木以為生肝木枯則心絶肝乃心之母子絶則母孤外症面黑目直狂言妄語心身悶熱心火離散逢壬癸日死經曰足太陰脾屬土賴心火以為生腎水克心火火滅則脾絶肺為脾之子脾絶則氣不行外症面浮黃洞泄不自知脾主肌肉肺主皮毛肌肉消瘦皮毛枯焦唇反不收逢甲乙日死經曰手太陰肺屬金賴脾土以為生脾土倒則肺絶肺主氣行氣溫於皮毛鼻乃肺之竅而氣出入焉外症皮枯毛脫氣粗唇反金無土養肝藏魂肺藏魄肺孤而魄散逢丙丁日死經曰足少陰腎屬水賴肺金以為生肺金燥則腎水涸腎水枯不生肝木外症目無光彩不與心火相濟自汗如水腎經衰脾土欲克而不能克真氣自傷故面黑內結齒黑焦枯逢戊己日死治法二十八條一痘初起疑似未定丹溪驗耳居手足指尖俱冷及耳後紅筋赤縷未可盡信不若於一二日內看舌上半白上下唇起赤黑暈兩目畏燈者為真一初起目光唇紫略帶焦枯舌起白胎兩臉紅光者屬熱不宜熱藥宜四聖散十神湯加骨皮汗透為度汗後壯熱不除光腫不散服透肌散一二服一日夜連服三五六服面白熱退而止如熱不退人事不明亂言亂語用犀角地黃湯不效用水調六一散一兩作三次服又不效用解肌化毒湯一二服熱退水生乃可治如至二三日大熱不除痘已見苗並熱難退即復投以保元湯人參黃耆之劑未有不潰爛而猶生者一初起太陽有汗而熱熾唇不焦地角肥潤生氣光澤三日點不見至四日而苗出漸漸如水灌子此屬涼痘縱密而無危宜少服八物湯十全大補湯加山楂等藥以保元氣氣盛而依期長泛者不必藥一痘光澤者不必藥若紫黑小而實在皮下不出者急服四物十神湯取大汗後用透肌散身涼為度延至四五日大熱不退毒侵皮膚則為不治矣一凡初起麵灰色不光澤壯熱唇焦點色紫黑者作熱看解衣則生緩則不治一初起疑似未定症類傷寒宜服升麻葛根湯有汗不宜服葛根用過恐大虛其表難於灌漿蓋汗即是血血即是漿一初起肝風心火交爭而發搐宜王氏惺惺散甚至顛狂宜六一散一初起一二日內太陽無汗宜四聖散十神湯加丹皮骨皮取大汗如洗則毒散而痘稀若熱不除用透肌散身涼熱退多者減少少者竟無一初起一日或半日內紅點見而少者急服四物十神湯取汗務令熱退不然則乾紅症出五六日而死一初起一二日內面紅腫而淚不流者取大汗身涼後宜服八物湯加升麻白芷麥冬收功一初起一二日點見而覆沒乃影痘也至七八日熱退而出最防郁苗一初起一二日泄瀉臭而不止者不宜止穢儘自止因夾宿食而瀉故無妨一初起之時男犯房勞十全大補湯保元湯救之一痘當長泛七八日內泄者宜四君子湯送下七味豆蔻丸如不效用粟殼去膜陳皮留白為末砂糖調服此症有二初起熱未除至七八日泄者清氣下陷為不治若身涼色白陷多作虛寒者宜依方調治恐內虛不食而死一六七日痘出齊紅紫不光澤長泛壯熱未除但地角人中有水光者急服透肌散除熱可治或乍寒乍熱水生而復枯者不治一凡痘出七八日長泛肥滿光澤者不必藥色紅紫屬熱宜透肌散加四物湯清肌防黑陷一凡痘出六七日長泛法光澤色白缺肥潤或嘔吐瀉利者屬寒宜十全大補湯加升麻白芷麥冬以防虛癢倒靨一凡七八日黑陷多內無火泡不煩渴兩顴光澤者服解毒湯以下結糞次服十宣散收功一凡七八日色轉黃瘡頂略皺表虛而作癢者宜大補藥將收作癢宜仔細看守恐不覺抓破二三十粒者不一時百症俱作乾紅而死既收而爬破者宜二白散酒調服七日以前爬破者氣血交會宜敗草散敷之投參耆實表裡八九日氣難血散爬破者服二白散而生者幸耳二白散白朮土炒白芍酒炒等分為末酒調時溫服之一凡八九日將收色宜竭若色紅甚焮腫者此毒氣太盛宜梔子麥冬湯加甘桔服之一凡十二三日收完結痂目清靨厚飲食日進不必藥若煩渴而泄瀉者四君子湯送下豆蔻丸一凡十三四日收完目起紅瘴用穀精散四物龍膽湯時時服之兔糞煎湯代茶服亦效一凡十四五日至十八九日兩足浮虛面出黃水宜消毒宣風散或黃連解毒湯一凡孕婦將燒一二日宜服罩胎散餘症見後一凡孕婦不宜服葛升湯牡丹皮宜人參紫蘇飲倍用羌活以解表毒一凡孕婦初産必生虛熱痘不出矣宜十全大補湯生熟四物湯時時服一凡初起一二日內身大熱太陽汗出而點未見至三四日熱退八九日復熱延至半月或一月者名曰煉地宜避風寒若為風寒所折必一齊並出甚者七孔流血而死慎之慎之一起一二日遍身紅斑在皮下不出不長泛者乃傷寒發斑也丹溪治法三十條其中十四條最宜詳味故謹述之一痘疹春夏為順秋冬為逆一痘分人氣清濁上取勇怯一燒三日不退防郁苗急宜解汗以清其地汗不可太急急則拈地一燒三日略見紅點如酒刺不長泛者非是要查看一燒三日出完六日漸長如粟米光澤者不必藥在皮下者凶一初起自汗不妨是濕熱熏蒸故也汗多者用人參黃耆實表以防難收一初起以惡實子為末蜜調敷囟門可免眼患此法甚妙一初起煩躁狂言渴飲若飲水多者難治急宜涼藥解燥如六一散之類一凡痘瘡壞者一日內虛泄瀉二日外感風寒三日變黑歸腎一凡痘出稠密者用人參敗毒散犀角地黃湯稀則毒少稠則毒多宜以清涼之劑解之酒炒芩連多服亦不妨也一凡痘乾者宜退火用清涼之劑薄荷荊芥升麻乾葛之類濕者肌表之間有濕氣宜白芍防風白芷之類蓋風藥亦能勝濕也一凡痘癢塌者於形色脈上分虛實實則脈有力氣壯虛則脈無力氣怯癢則用實表之藥如大便不通以大黃等寒涼之劑少少與之下其結糞輕則用淡蜜水調滑石末以鵝翎刷上潤之一凡痘當分虛實氣虛者用人參白朮加解毒藥血虛者用四物湯加酒炒芩連名解痘毒是也一凡痘分氣血虛實大抵於氣血藥中分輕重為用以平為期有犯外邪而實者加防風表藥治法當活血調氣安表和中輕清溫涼之劑兼而治之溫以當歸黃耆白朮術香涼以前胡升麻乾葛佐以川芎白芷白芍枳殼桔梗羌活木通紫蘇忍冬甘草之類可以調適矣輕症條例一凡初起壯熱太陽流汗不煩渴泄瀉嘔逆三日點見不密者佳一凡初起熱微嘔吐泄瀉汗出點見紅者輕一凡初起壯熱有汗狂顛人事不清三日熱自退四日點見者輕一凡三四日內面色紅潤目清唇紅熱不壯飲食如常不煩渴者輕一凡一日內壯熱吐瀉點見紅者必取大汗汗透者輕一凡三日熱退點出血泡大而轉小六七日轉淡黃色者輕一凡痘出齊六七日滿面光潤者輕一凡孕婦胎落目清不煩痘腳稀者輕一凡十一二日如褐色或花收或濕收或干收面部收完日開一線黑白分明者輕重症條例一面色灰白無汗痘出點腹痛唇焦及內有宿食者死一初起熱三日退出點色白面色灰白者乃內攻之症用重治法一初起而紅舌者無汗煩躁點見小而實者危一初起面白目青流淚無汗天庭點見小而實浮起不汗者危一初起兩足痛不能忍面色皎白點見小而白身不煩渴者危一初起壯熱無汗二三日痘乘熱而出又服保元湯太和雞湯至七八日譫語皮爛者危一凡初起女犯房勞者死一孕婦胎落熱盛皮紅煩渴一齊並出咽喉痛者死一凡未出之先飲食過多內有宿食以致胃爛成斑黑色者五日死一凡痘出齊壯熱遍身通紅唇齒焦枯乃血不居位四日死一痘出齊紅紫不光彩苗焦地枯淚流煩渴舌全白乾枯者危一痘一齊並出壯熱色白不渴泄煩躁不止者三日危一痘一齊並出生水身無大汗飲食不減面生疔毒過關身不起者危一痘起泛舌轉淡紅略帶白色如爛豬肝者死一痘起泛身上涼七八日內泄瀉火燒如燎者死一凡痘齊出至七日熱退面部胸前皆起項後不起焦枯滿面而空起油膩者危一痘七八日長泛不肥滿煩渴黑陷兩頭髮火泡四肢起胸背上不起者危一痘八九日收不過關不結痂者危一痘起十二三日將收完口開眼閉煩渴譫語色皎白臭氣粗者危一痘起十一二日將收完氣臭充入腦頂者危一痘將收未收作癢爬破者危一痘收後飲食過多作泄者危一痘收後癰毒潰爛久不生膿者危一痘收完下利多食目睛陷穀食不化者危一痘後完痂落無疤跡遍身色白如鼓皮不思飲食者危相格論嘗觀小兒痘疹雖原胎毒以成然其發越實本歲運而至欲知治法當辨生死初起決其生死須觀主痘何如初發熱而痘點先見者為主痘主痘見於太陽司空之地光澤者輕生紫黑者垂危欲知治法必於死中求生紫黑者內毒已成升提以泄其壯熱光澤者內養完固善調以保其太和升提則升麻葛根為宗調養則以川芎當歸為要密如蠶種須防提起必死形如鼓皮最怕流淚定死點如蚊錐汗後不起者不治已上三症當用四物十神湯取汗透肌散清地唇下人中漸漸生水若水生復干大熱如前者不治形似糠粃太陽汗乾者莫醫渾身壯熱汗枯必然並出死症無疑少婦房勞色白亦能並出妙手何用脾虛則淚灌瞳神譫言多水腎虛則鬼祟其體狂言多妖腎屬陰而藏鬼患者多見鬼知其腎空虛非真鬼也舌不出唇心已喪耳居反熱腎將枯用梔子麥冬湯滋腎水加黃柏知母服之唇裂齒乾莫治面仰頭直休醫舌上疔如枯樹舌下黃如牛奶柿形此乃熱毒生心經不必良方生時後男子原於心熱婦人乃是産虛用玉鎖匙點舌四神湯加梔子麥冬連翹黃芩以治之若舌上黑瘤不一時如龍眼大紫黑血泡塞口潰爛莫治天堂先起者否地角先見者泰手足未見而頭面獨起號曰四體不均此熱蒸於面手足屬腎腎之所部獨冷面受熱蒸而苗已枯是以腎部未受熱蒸而起水枯火盛乾紅之症能無危乎腰背密而胸前獨無實為一心之主胭脂色地不作膿水灌於形易長泛凡觀表裡之間必察經緯之內心經本乎胸前肺緯原乎背後心經實而心窩疏肺緯虛而背後密心混心家熱咳嗽肺生痰咬牙脾土弱恍惚腎水枯虛乃脾土發生無腎水則枯無肝木不茂無肺金不生腎水枯而心火熾是以肺金受傷肺金傷梔子麥冬湯加二陳主之而痘苗枯實本脾土熱金不能生水苗如枯脾土乾燥而熱痘將出而唇上破裂者脾土大熱乾紅之症不無急用解肌化毒湯連進不效加軟石膏救之唇白不收者脾土大寒泄白之痢必有十全大補湯倍人參黃耆救之急用參湯調飯匙膠主之初起腳疼者血少腰痛者營虛胸背乃受虛之地緊要之關不宜痘密手足乃堅硬之所輔佐之鄉縱密無妨面不起而天堂有膿陽氣散而死期將至面已起而頸項無水關節隔而生意必無胸前黑陷心家熱下其結糞可醫解毒湯可治通聖散亦妙背後焦枯肺作痰鼻起烏煤不吉腰纏羅帶腎水枯脅表赤紋脾土無羅帶纏身應有陰陽之論帶如灰白定為虛弱之凶色似灰白喘咳何安八珍散去朮而加參耆為當腹似鼓皮煩渴不已解毒湯倍歸而投枳殼為宜欲出不出煩躁無微汗者大凶或燒不燒泡爛有赤斑者愈險三四日內因有宿食以致胃爛成斑治法當用解毒湯加大黃下之但人惑於汗下說執不肯下是以就手待斃豫於此揭示後人與其袖手待斃不若幸而成功吾見世之出斑未齊下而好者十有八九人何寧忍死而不肯下乎五體密而胸背疏縱重何妨四肢多而頭面少雖險可醫虛處多而實處少獨防虛弱難收虛處少而實處多善加調養易好面腫脹而身不腫者毒上凝而不散面起泛而身不起者症已敗而命終凡看小兒痘疹先觀五藏何如舌全白者心喪齒全黑者腎亡肝絶則目赤淚流脾倒則唇焦掀露肌肉消白者肺絶痘腳紫黑者血枯虛處多毒積於五內實處少毒散於四肢初燒壯熱不除定知郁苗而死汗透身清熱退苗隨汗出必生先服透肌散次用解肌化毒湯急服以救苗也此乃痘家之祕訣實為後學之良方瘙癢蓋緣痘嫩參耆桂術可投食挫定是痰多甘桔二陳莫緩黑陷火炎水竭解毒湯投之甚宜咬牙土濕脾寒異攻散服之允當煩渴無膿痰氣盛終為陰府之人泄瀉失被飲食少難作陽間之客肥滿光澤膿窠泡者尤佳平塌焦枯腳下黑者不吉舌上染霜心內熱十神湯內麥門冬眼中流淚脾家虛八物湯間耆朮等睡中驚跳莫疑邪未出狂言休為重熱吐痰多毒反攻於內心先受證所以生狂宜解毒湯加梔子麥冬黃芩主之重變輕而易好遇乎濟世之醫輕變重而難調遭乎風寒之閉先用透肌散以實表次用四物湯與解肌化毒湯以和中所為安表和中可以無危黑斑幾點發在實地也堪醫紫血數團發在腎經難得解紅斑成片發於腰背達臍者不可治肺經不起任扶上岸也生痰肺麗於背自頸後至背不起泛者必生痰喘宜補肺散加四物湯與穿山甲以升提主之面生輕薄得到頭來適作怪肺經不絶必生痰而作氣面色灰白定瘙癢而不清小兒多有水光因而作癢婦人豈無裊體眼硬流漿痘灌漿而表虛宜大補湯保元湯倍耆桂以實表緩則皮破血水流謂倒靨用敗草散敷之若少婦肌肉裊薄被席堅硬磨破不可以倒靨看若加實表之藥反增潰而死男子老來最怕實光而不灌後生壯者應嫌房事以傷神男受症而與女交為陽易十全大補可生女受症而與男交為陰易百無一治必死睡則被驚而醒蓋緣心火之未治食則作嘔而還是因胃氣之不足困足聲干如敝車不吉之形灌里流漿乃枯木不凋之象鼻枯唇裂本凶氣促目翻不吉眼失瞳神終歸陰府眼無光彩定棄人間神昏不定被驚梔子麥冬湯以瀉心火胃氣不和致嘔藿香正氣飲以調胃寒雲肩垂而生痰氣頸鎖重而隔咽喉雲肩者頸後白陷而焦枯頸鎖者咽喉垂陷而無空二者皆火盛而毒上凝透肌散四物湯穿山甲去雲肩牛蒡子甘桔治頸鎖雲頭花滿身不吉霞色假遍體何安紫黑焦枯應有板牙之論齒唇掀露還詢往日之因煩渴不定心受熱瘙癢不已體遭魔硬舌言語不清色如爛豬肝者必死咽喉吞水不下痰如死狐臭者不宜噦噫者胃氣不和嚼赤豆立止疼痛者脾胃卻絶想人世難留燒出蛔蟲非積氣多者不治經云蛔蟲而胃絶平日積氣生蟲遇胃火盛蟲乘熱而上行雖多無妨苟非積氣必胃絶也宜白虎湯治之泄盡死血若成塊少者莫醫應嫌瘡癤不分明更怕癰疽而泄氣痘將半足若生腫毒得長生腫毒已成爛肉黑沉還不美痘毒已成宜發焮腫則新血盛而敗血成膿此生新去舊之義也宜八物或托裡散苟非服涼藥太過氣血衰弱肌肉沉黑而死孕婦防燒極以臨盆産婦怕血氣而汙體正治偶遇月經猶防汙穢天花若非大補良劑未可全稱福果正當長泛時候且看膿色何如清漿則易靨難收實漿則易收緩愈足跟知痛身上漿收痘已出盡身熱不退亦擔憂痘已長完窩內無膿還不美長完漿灌須察是水是膿灌足漿收須見有痂有靨長泛是水皮薄者難收灌滿是膿皮厚者易斂不結痂如疔靨貼肉不美謂之假塌陽收靨邊赤色如死血染皮甚凶謂之乾紅火泡睛清則臟腑無毒皮赤則表裡有傷面部收完目開一線黑白分明則知內毒已盡白珠紅者內熱宜四物龍膽湯主之皮赤者毒未盡也與再三參看宜解毒湯主之靨邊白色易好瘡邊紅色再翻兩足浮虛氣未除而有毒荊防敗毒散主之五心燥熱熱未退而要涼收時氣促腹脹必生結症此為不治之候宜蘇子降氣湯主之完則口開眼閉恐喪心家此亦不治之症此症有毒若參陽位矇頭蓋面身上稀少則毒氣易除面部凝而不散是以口開眼閉或爬破復灌者宜解毒湯加生地赤芍銀花芩連行下之藥急救之好則依期而愈未臨半月收還否者過日而延卻過四旬不足美幼兒氣衝皮薄十日收完不為太急老人氣衰皮厚十日而長豈是遲延面赤眼紅心經多受熱咳嗽咽痛肺上定生痰既收而出黃水乃是餘毒未除若收而生水泡亦是熱氣未散宜與倒靨條參看半漿水泡起於胸背青黑水泡發於四肢人事清爽飲食加進者不必藥此氣有餘而血不足宜少與四物湯和之眼眶露出紅筋必生翳膜靨遲現出赤色定有餘災魚口蛇腹定知亡虎斑蛇皮俱不吉亦有巧中藏拙絶處逢生人生分乎貴賤命難定乎短長貴人體厚難禁勞碌之形童子體裊怎受非常之熱貴人八分折十賤者四分減三初起不避風寒必生壯熱不節飲食必致胃傷不戒嗜欲必損元氣唯有內生外死猶可詳觀譬如根好葉枯終當發達凡用藥俱用炒研入煎方得出味辨痘疹與傷寒相似治法與傷寒不同者何相似不同者丹溪之心法也痘疹無全書亦天地之一缺也此二句參天地之化致中和之氣成位育之功補天地之一缺發聖賢之未備包括多少意義所謂相似者何初起之時憎寒壯熱頭疼腦痛身熱脊強不眠舌乾口燥寒熱嘔而口為之苦此其所以相似也何為不同傷寒從表入里一二日宜發表而散三四日宜和解而痊五六日便實方可議下故傷寒先治表而後治里痘疹從里出表一二日毒氣內壅宜托裡以解表二三日內有宿食以致胃爛成斑宜急下以和中故痘疹先治里而後治表此其所以不同也且症類傷寒者多矣豫見十二三日飲食多者反死不進飲食者反生與除中何異大熱未除咽喉舌爛齒牙脫落與狐惑同條煩極而渴熱熾成斑譫語鄭聲虛實相等多眠不眠轉重可知舉此以示後學所以發丹溪之未發也且傷寒明表裡毒入於內以致發狂方可議下下之早者結胸傷寒下之宜遲痘疹明虛實毒壅於內而不發越便宜速下下之遲者胃爛成斑是以下之宜早表裡明則傷寒無不治虛實辨則痘疹無不調治痘疹端在此古人云胸中有全馬然後可以畫馬豫亦曰心中有全痘然後可以治痘正治從治者何夫痘疹雖原於胎毒所成實藉氣血以為主榮衛和調脈絡循軌一有偏勝其害立見燒三日身清而出自然之理或半日或一二日熱未除而點見太陽司空之地色白而空殼者何夫司空之地心實主焉毒不能出而反入是毒氣攻心而臣欺君心無主宰火盛剋金而血不華體名為內攻之症夫心火不可驟遏宜行從治之法蓋以寒治熱以熱治寒此正治之常法也以熱治熱名曰從治內攻之症非從治行權則莫治焉痘見空殼血不蔭根面白唇黑臍下紫斑此內攻之症也宜四物湯加升提藥以從治之令毒侵皮膚痘腳紅活徐進以透肌散正治以解之從之太過恐毒盛肌膚固結而不可解一從一正至再至三候其見點大淡紅地肥苗秀略見光輝人事平靜則從治之藥斯止此法甚效人所不曉必點初見於司空之地而詳審焉否則五臟潰爛五六日而危不可救矣學者宜盡心焉辨今人不用異攻散陳文中用木香異攻散乃寒水司天之時屢獲捷效自宋曆元至明率皆用之遇歲火毒流行概投以異攻散而時藥不旋踵而死畏不敢用夫山野農人多受山嵐瘴氣毒鬱於內以致陷伏倒靨寒戰咬牙灰白頂陷泄瀉昏睡苟不用辛燥之藥劫而出之將何成功豫故挈而辨之以語後學辨今人輒用保元湯夫痘疹先辨寒熱為主一二日熱壯點見此症屬熱用涼血解毒安表和中輕清之劑以身涼而止此古人正治之法也至四五日後血熱妄行毒侵皮膚投以清涼之劑尚未可收成功而況與之保元湯者乎今醫不問身熱未除一二日內概與之保元湯不效而以太和雞湯至於煩悶又進以獨參湯是以熱而助熱血妄行而痘密火愈盛而水愈枯陷伏不起未有不顛狂焦枯唇齒舌爛而死哀哉夫異攻散既為陳文中之病保元湯與異攻散又何異乎今醫常云某用保元湯而生某用保元湯而效殊不知遇於寒涼發之當而成功易遇於火毒此與異攻之害可勝言哉今之時火毒流行熱症十常八九寒涼亦有一二熱甚點見為熱症急用清涼之劑三四日熱退見者為寒涼宜用保元湯後之醫者當辨寒熱幸無執滯以失人為身後纍其謹鑑之辨汗下二說按丹溪云始終不可妄為汗下其言妄為者何蓋言未嘗不汗下但不可妄耳於此不可不辨昔人借喻云如庖人籠蒸之法但欲其松耳治法宜涼血解毒安表和中其或氣盛煩躁熱熾盛眼赤皮紅光腫此毒侵膚肌表受症若不急汗以解表則熱愈盛而毒愈熾血熱妄行毒侵皮膚一齊並出則不治矣宜先服四物十神湯以蘇利之汗透為度略用升葛以解表則毒氣有所滲而出毒從汗散痘從汗出自然開腳生水此所當汗也苟熱不為汗則壯熱不除大便不通煩躁胸高內有宿食點見紫斑急用承氣湯或通聖散白虎湯下之則內無壅滯氣血順軌而清涼苟不急下則毒蒸臟結臭爛而死此始當下也汗後自利苗下泄也此為重症變輕穢盡而利自止不必止也宜以八物湯保元湯十全大補湯徐徐飲之以助成功如八九日火熾壯熱水枯黑陷大便閉結毒壅於裡而五心煩熱急當下苟不急下則毒鬱於內無由發泄內外固結火熾水枯黑陷而死宜解毒湯少與芒硝以軟堅當歸以潤腸枳殼以導滯而結自下則毒氣流行表裡俱解火降水生此終當下也學者宜盡心焉不可惑於時論袖手待斃也四物十神湯治一二日內點見熱壯無汗或自汗者並宜服之取汗透為度當歸生地蘇葉各一錢川芎白芍升麻乾葛白芷各五分香附陳皮甘草各三分熱甚加赤芍麻黃皮紅熱壯則加丹皮骨皮姜石膏湯治三四日熱壯大便閉胸高而躁生石膏七錢桔梗二錢東參一錢水煎溫服承氣湯治同上枳殼厚朴各二錢朴硝大黃各七錢姜三片水煎服防風通聖散治壯熱不除又大便閉塞胸中煩躁飽滿防風白芍薄荷當歸川芎甘草厚朴梔子連翹黃芩桔梗白朮麻黃荊芥滑石石膏大黃芒硝共十八味姜三片水煎溫服解毒湯治八九日熱甚水枯黑陷者陳皮甘草各三分白芍連翹梔子黃連各五分當歸炒生地炒黃柏炒各八分防風荊芥枳殼黃芩朴硝牛蒡各一錢陷多加大黃二錢姜三片水煎服辨初起腰疼凡初起之時頭痛腦疼及肚腹疼痛者乃為順症甚至腰痛不可忍者或有腳疼而至於腰者世以為毒藏於腎而不能發越率為難治而又見可治者多矣豫參考諸書惟丹溪語及此是知其腰之痛也蓋由鳩尾骨者太陽所過於此榮虛不能導衛陰血為之停留新血相觸而作疼是以鳩尾骨痛而達及於腰世人誤為腰痛治法活血調氣用四物湯加酒炒黃柏酒炒知母以桂心為引甚者加乳沒或痰盛而作疼者用二陳湯加炒黃柏酒炒知母以廣木香為引陰虛痰盛合二方而用之治未出而腰疼腳痛者則升提發散之藥亦可用四物十神湯學者所宜盡心焉師鑑按證治大還云鳩尾骨痛痛甚屬痰二陳加木香前胡黃柏知母至陰分作痛屬陰虛濕熱六味丸加當歸牛膝防己黃柏知母肉桂紅花加味四物湯治痘未出而腰痛當歸黃柏炒知母升麻各一錢熟地半錢川芎八分白芷三分桂心五分痛甚加乳香沒藥各五分水煎服加味二陳湯治痘未出而痰盛腰痛黃柏炒知母茯苓升麻各一錢木香甘草陳皮半夏各三分痛甚加乳沒各五分姜三片水煎服辨影痘凡初起一二日熱未壯而皮略見紅點者有見而覆沒者為影痘不必驚疑必俟熱壯而出痘出輕鬆淡紅此毒侵皮膚順症不必藥點出而浮小色白而無血者屬熱毒氣留於命門遇相火合起則發以通聖散寒涼之劑解之防風通聖散治點出而浮小色白而無血者防風薄荷赤芍歸尾梔子連翹黃芩白朮川芎荊芥穗甘草青黛滑石石膏共十四味水煎服辨發斑夫斑者有色點而無頭粒者是也蓋緣飲食過多傷於足太陰之脾土熱積於手太陽之心火入於手太陰之肺金故放點而斑生出於腰腎皮毛之間從胸背絡頸而入腹者死先賢曰胃爛成斑又曰內傷外斑一身之火遊行於外色紅而小者用通聖散以散之或玄參升麻湯豬心龍腦膏治之宿食未消壯熱不除四順清涼飲子下之若斑紫黑身壯熱斑出自下而上及臍者不治至領者死丹溪曰斑紫紅十有九死紫黑者十無一生良有以也豫見斑少痘多開腳生水身無大汗者亦當治之不可執一端也通聖散治痘發斑麻黃大黃五分朴硝一合水煎服玄參升麻湯治內傷外斑一身之火遊行於外色紅而小者大青玄參升麻乾葛羌活獨活歸尾黃芩茵陳石斛各等分水煎溫服豬心龍腦膏治同上梅花冰片一分宰豶豬心血一個為丸如桐子大每服一丸紫草湯下四順清涼飲子治宿食未消壯熱不除成斑當歸白芍各一錢甘草五分生大黃錢半胸高滿加厚朴一錢枳殼一錢姜五片水煎服辨用雞先後夫雞之為言稽也易稱翰音乃火德之精其性興陽其功同參性味甘溫無毒多食則火動生風世俗見痘出者食雞而成功不論先後虛實寒熱但見出遲發慢概與食之食後咽喉腫痛壯熱皮紅風動生痰目赤淚流斑爛而死豫深哀之夫雞何害於食但始發之時熱未除不分寒熱切不可食至八九日轉漿而色淡黃光澤而不肥滿氣虛白陷不起身涼多睡咽喉爽快痛少便清此屬虛寒之症宜與食之用筍為引白水熬成膏如常食之少加鹽而略和其味藉火氣以行血於是白陷者紅活突綻而起惟虛寒之症可食若熱未除而多食未有不敗乃事者辨誤服熱藥成斑夫小兒難任非常之熱亦難任非常之寒宜溫和通用如初起一二日內壯熱未除而誤服熱藥並冒風暑成斑宜服陽毒升麻湯若氣血兩虛發熱誤服涼藥下之太早以致斑爛宜龐氏石膏湯若有宿食成斑治見前陽毒升麻湯治誤服熱藥成斑升麻人參各一錢射干黃芩各二錢犀角磨三分水煎食前服龐氏石膏湯治誤服涼藥成斑氣血兩虛而發斑朴硝五分香豉一合蔥白一枝大青升麻各一錢石膏五分生薑五錢水煎服辨黑白二陷凡痘初起燒三日未見紅點熱退身涼至六日出齊頂尖光澤不必藥至七日頂復平名曰開腳八日內四邊高起而中陷者名曰生水色轉淡白漸漸轉黃至九日成膿中陷高起者名曰圓頂四邊色紅收近者名曰圈腳至十日褐色如灰白者正收不必藥八九日而陷不起者何夫陷有二種白者為白陷黑者為黑陷諸書所載黑陷而未及白陷乃先賢之所未備夫二陷系寒熱後人但知黑陷為實熱能殺人又謂之返黑歸腎先儒謂十無一生殊不知白陷為虛寒亦能殺人黑陷多用百祥丸豫以為傷其脾土不用以解毒湯代之活者甚衆惟白陷者無治法是為缺典豫知氣虛不能導血過食以傷脾土或服寒涼太過耗散精華故有是症宜異攻散補中湯上奇散詳症施治解毒湯治火盛水枯黑陷方見後補中湯治氣虛白陷人參黃耆各一錢白朮當歸麥冬熟地各五分川芎升麻白芷白芍甘草各三分桂心陳皮各二分胸前陷加銀花背上陷加山甲面起身不起加黃芩五分餘熱不清加骨皮三分泄多加赤茯三分有宿食加山楂肉三分泄多再加鹽梅一枚燒用薑棗引酒煎熱服上奇散治同上人參黃耆當歸各三錢厚朴桔梗各五錢桂心二分川芎防風白芷甘草熱和升麻為末酒調服辨反黑歸腎為黑陷豫觀諸書洪範五行水潤下火炎上心腎二經所屬之地水火不容並立水枯則火盛自然之理也況無治腎之法但有解毒散火之理豫知火盛則苗枯黑陷非歸腎也治法當用黃連以瀉肝木為心之母麥冬以清心也升麻升陽氣於陰之下行肺氣以平肝兼能散火白芷當歸生新血以助心生地黃炒黃柏以補腎枳殼佐歸以寬腸而導滯朴硝少許以軟堅梔子下屈曲之火黃芩引血以歸位連翹開鬱而降火白芍均氣以補陷荊芥以退火毒名曰解毒湯如此則火降水行黑陷自然轉漿而愈辨火論人具五行各一其性心為君火又有相火現寄於肝腎之間相火易起煎熬真陰陰虛則病陰絶則死夫痘疹一症繫於心肝脾肺四臟之火內經所謂五火相煽是也一發則為之斑爛世以傷寒一類治之惟丹溪主寒熱表裡虛實之論豫知氣盛血壯者屬火出而斑爛氣衰血少者為寒出而稀少此寒食輕重之分也夫輕者不藥而愈重者豈可束手待斃豫此辨而極言之近歲火毒流行熱症十常八九寒涼間有一二必當升陽散火以清肌膚此扶陰抑陽之義蓋火不可豁遏必輕清和解是以用四物十神湯取汗以行疏利之法則用升麻升陽散火解肌而毒出首汗後火不熄仍前壯熱兼以面色皎白痘小而空殼此火鬱於內毒不能出而反入其為症也人事不清口多譫語而生黏痰此乃熱火成毒攻心舌必全黑復用四物十神湯加丹皮骨皮以升提之俟其火發而有微汗遂用透肌散以清之一晝夜連進二三服如顛狂不止蓋緣真火之未降也進以井水一碗調益元散一兩飲之必口吐痰涎人事輒省此真水能降真火也如不效用解肌化毒湯必一二服熱退身涼而止此無他火盛則血妄行毒侵皮膚故耳若非猛進藥餌則不治也然涼後火毒者何也名曰乍涼非誠涼也夫瀉火者耗其真陰陰虛火動自然之理先實後虛也宜以保元湯大補元氣氣盛則火自降非深知其道者烏足以語此透肌散治一二日毒氣凝結面紅煩悶牛蒡子二錢炒荊芥穗木通各一錢山楂白芍各八分陳皮甘草各三分燈心一撮姜三片水煎服解肌化毒湯治一二日痘見點顛狂不省人事面色紅腫防風荊芥梔子連翹柴胡前胡羌活獨活升麻丹皮乾葛白芷麥冬赤芍黃芩骨皮心煩加犀角黃連涼後用八物湯將前藥各等分燈心為引水煎不拘時服身涼而止益元散治同上二便利者不宜服滑石六錢甘草一錢共為末水調服加硃砂三分名曰辰砂六一散四川文宗高受所媳乃西田庠生林體乾女年十六種痘起自初八至十二不能言語臥不安席起臥之時循序不亂楊橘泉治之不效問紫姑仙質以藥方仙曰操舟者不知把舵之方焉能令舟就岸以卸其貨今喻子在此何不用之延豫看痘立方與仙合知其火盛痰生以迷心是以不能言熱毒攻心是以坐臥不安用解肌化毒湯倍梔子芩連加牛黃一分三服後痰吐盈盆而能言舌黑如茨痛飲茶五碗方睡而愈姑仙呂純陽贈詩一首詩曰蓬島仙人久慕名塵凡醫類笑無明金聲一振聲難敵玉液金調果有靈大手挽回春氣盎妙劑推轉病元寧先生總合神仙意莫大陰功海島平辨表實表者外也痘疹從內出外寒在表熱在裡紅活凸綻為表實不必藥初起之時外感風寒內受鬱熱毒氣不能發散由是凝結於皮膚無汗而光睡臥不寧此表實而熱也宜四物十神湯汗透以肌表用透肌散以和氣不然黑陷水枯乾紅之症不治矣辨表虛夫虛者氣血不足之謂如不起面白唇紅舌黑汗透毛端此氣血不足且看其熱微壯何如微者蔥白湯少許亦能壯氣而痘自出至五六日出不快六七日開腳生水不作膿此虛症而寒也宜人參養榮湯倍加參耆以實表自然靨也不然白陷寒戰倒靨泄瀉之症出則不治矣白陷甚者宜異攻散人參養榮湯治六七日表虛色白食少寒戰陷頂泄瀉人參二錢黃耆當歸白芍白朮各一錢熟地五分川芎茯苓各五分桂心陳皮遠志五味九粒甘草炙各三分泄瀉加枯礬三分加山甲二分食少加山楂五分痰加川貝母五分薑棗為引水煎服辨裡實凡出痘犯壯熱煩渴之症多虛寒之症少里內也痘乃從內出外能食不瀉吐為裡實不必藥初起乳食不節外感風寒內受鬱熱舌黑唇焦目翻氣促言語不清人事不省壯熱煩渴此裡實而熱急宜服四物十神湯大汗以泄其熱解肌化毒湯以解其毒水調六一散以通其滯如有宿食用石膏湯以下其滯內毒已解熱退身涼自然出快不然內敗口臭眼合氣粗狀如風疹甚如糠粃不旋踵而死矣辨裡虛凡痘初起腹痛嘔逆泄瀉不食煩躁不渴此裡虛而寒也宜藿香正氣飲和中安胃自然長泛不然則寒戰咬牙灰白倒靨為不治若多宿食吐瀉者未可以內虛看當以泄瀉相參看治之藿香正氣散治嘔逆不食藿香紫蘇腹皮陳皮茯苓桔梗甘草厚朴半夏白芷嘔甚加砂仁人參乾薑各等分薑棗為引水煎服辨表裡俱實凡痘初起能食而不嘔瀉微渴而汗面色紅活此表裡俱實不必藥亦有過於實者舌黑唇焦心煩目閉語亂昏沉此裡實之過也宜四物十神湯一服取汗解表又透肌散連進二三服以解毒面白熱退身心清為度如不效解肌化毒湯連進三五服緩則不治醫者所當用心也辨表裡俱虛凡痘初起人事清不甚熱舌不白唇不裂飲食少進不煩渴面色白微利而嘔此表裡俱虛也宜用八物湯加升麻乾葛白芷黃耆人參以助其里又有虛之過者乳食不進自利不渴多睡心清為裡虛之過也不大熱面皎白目清不閉皮不腫而多汗唇微焦舌微白此表虛之過宜四君子湯保元湯多服必全紅活突綻而止八物湯治一二日表里俱虛人參當歸熟地川芎茯苓白朮珏白芍各錢甘草升麻白芷各三分棗圓為引水煎服保元湯治表虛之過人參一錢黃耆錢半陳皮甘草各五分圓肉為引水煎服六君子湯治虛而嘔者人參焦術茯苓各二錢甘草陳皮砂仁各一錢嘔加姜香薑棗為引水煎服辨外症順逆初起血泡次為水泡又為膿泡又為褐色又頂起血蔭盤子為順初起密錐次如胭脂又色白灰又如鳩眼又如繭殼者為逆身體溫暖能食便結為順寒涼太過不能食下利為逆辨外症輕重輕者三次出其中無大小不一根窩紅活頭面少光澤肥滿重者一齊並出泄瀉煩渴密如蠶種身溫腹脹而色灰白頭溫足冷辨五臟形色心屬火時發驚悸其色赤發而為血泡其色赤肝屬木呵缺煩悶其色青發而為火泡其形小脾屬土能食多睡其色黃發而為膿泡其形大而班肺屬金面白噴嚏其色白發而為疹其形大腎屬水居下獨不受穢故無症耳居鼻尖俱冷毒氣留於命門或時氣傳染如得傳於心肝脾肺四臟腎無留邪者吉一二三日不能發而腎之所屬俱熱為逆症體格余相色黃有膿好色白有漿治色紅作膿急退火則生緩則不治色略黑而明亮治赤班治頂白陷有膿漿治死血不治狀如鳩眼中黑陷四邊高起不治赤如小豆有膿不治虛白無膿不治黑陷多不治下結糞善飲食不治軟殼吐漿不治灰白陷頂不治收後多睡痘小者為珍珠痘正痘顆粒圓淨辨不治寒戰咬牙不止紫黑色喘渴不寧灰白色陷頂腹脹陰陽交易頭溫足冷悶亂飲水氣促泄瀉煩渴辨不藥而愈痘腳稀少根窩紅活不泄不渴飲食不減唇舌尖紅身無大熱苗下有泄地位明白太陽有汗四肢溫和以上十條不必藥善加調養房室溫盎屏諸溫氣忌外人房室體穢婦人月水皆不可近應燒大黃蒼朮黃芩紅棗以解之不宜檀沉乳麝宜用芫荽煎酒噴其床帳夫氣聞香則順聞臭則逆世俗所謂靨也若信巫覡召外鬼反致不祥之禍辨外因凡痘初起欲出而未出因而發搐者是外感寒邪因而發心熱也蓋緣心火交爭而致之宜王氏惺惺散或升麻葛根湯木香參蘇飲之類惺惺散治痘未出發搐者是外感寒邪因而發熱人參白朮茯苓甘草桔梗川芎薄荷花粉各等分姜三片水煎服升麻葛根湯治同上外感風邪而發心熱升麻葛根白芍甘草薑棗為引水煎服木香參蘇飲治同上人參蘇葉桔梗乾葛半夏各七分前胡四分陳皮枳殼各三分雲苓八分姜引水煎服辨內因凡痘欲出而未出因而吐利者是中焦停痰或有宿食也宜四君子湯加砂仁陳皮或和中散若有宿食用紫霜丸四君子湯治痘出而嘔利者加砂仁陳皮名曰六君子湯甘草人參白朮茯苓各錢半嘔加藿香乾薑厚朴半夏各五分姜三片水煎服宜熱服和中散治痘欲出而未出吐者藿香厚朴各二錢焦術錢半乾薑一錢甘草五分姜三片水煎服紫霜丸治有宿食下利者赤石脂代赭石各一兩醋淬巴霜杏仁五分各為末湯浸蒸餅為丸如黍米丸三歲米湯送下三丸八歲以上十丸米飲食前服辨春冬寒盛用藥準繩凡痘出不快者有五症天時嚴寒為所折不能起發宜發汗溫表寒甚者紅點出見宜五積散正氣散調解散治之五積散治痘出不快為寒所折白芷川芎白芍甘草當歸半夏肉桂枳殼陳皮麻黃乾薑厚朴上藥將桂殼研為末先將諸藥水煎令冷再入二味用姜三片再煎一沸熱服當長泛去枳殼麻黃乾薑正氣散治同上陳皮五分藿香厚朴白朮各二錢半夏甘草各三分姜引水煎服調解散治同上青皮陳皮枳殼桔梗人參半夏川芎木通蘇葉甘草薑棗引水煎服辨夏秋熱盛用藥規矩夫夏秋熱盛煩渴昏迷痘出不快宜辰砂五苓散加山梔麥冬熱甚者小柴胡湯加生地或人參白虎湯倍加人參熱者人參竹葉湯加生地辰砂五苓散治嘔逆不清並陰陽不分煩渴昏迷痘出不快者辰砂豬苓茯苓澤瀉焦術肉桂各等分為末淡薑湯調下小柴胡湯治六七日當泛不泛血不居位身熱盛者柴胡人參半夏黃芩甘草生地薑棗引水煎服人參白虎湯治同上石膏知母人參加糯米一撮水煎服人參竹葉湯熱盛用此湯加生地人參一錢麥冬二錢半夏甘草各五分石膏七分淡竹葉十片姜三片糯米一撮水煎服辨形氣病凡痘已出而聲不變者形病也不必藥痘未出而聲變者氣病也宜補肺散痘出無聲身壯熱大便澀形氣俱病也宜當歸丸解毒防風湯十奇湯補肺散治痘未出聲變者阿膠一錢蛤粉炒牛蒡子五分馬兜鈴五分杏仁五粒糯米一撮水煎服當歸丸治痘出無聲身熱大便閉當歸五錢黃連一錢半大黃二錢半甘草五分先用當歸煎成膏以後三味為末用膏和成丸如桐子大一歲以上服三十丸米飲下解毒防風湯治痘出而聲不出形氣俱病之症防風荊芥穗生黃耆地骨皮赤芍牛蒡子各等分燈心水煎服十奇湯治同上當歸人參各二錢黃耆桔梗厚朴各一錢桂心三分防風甘草白芷蘇葉各等分熱加升麻共為末溫酒下辨三陰症夫三陰者厥陰肝經心包絡也主面腫黑舌卷青泣不止若不急治六七日而死宜十香散保元湯加升提藥則升陽散火而膿足少陰心腎二經主肉黑目直視舌乾燥狂言亂語身汗悶熱若誤為熱則虛煩黑陷而死宜四物湯以保血加麥冬以清心升提藥以安表此所謂安表和中也太陰脾肺二經主滿面浮腫洞泄不止唇反如煤肌不光澤四肢厥冷若不急治十二三四日而死宜理中湯治之使脾不虛肺不寒十香散治厥陰舌卷囊縮當長泛養血生膿熱去丁桂木香三分人參一錢桂心五青皮赤苓前胡半夏甘草訶肉丁香陳皮各五分姜三片水煎服保元湯方見前加味四物湯治少陰黑陷口乾舌燥紫蘇麥冬紅花升麻乾葛用蓮肉薑汁引水煎服理中湯治太陰舌卷陰縮發厥二便自利四肢厥冷人參一錢焦術一錢半附子乾薑各八分甘草五分姜引水煎服辨三陽症夫三陽者太陽小腸膀胱之病胎毒流於命門去膀胱為不遠主腰疼身熱小便出澀宜防風湯升提之令腎無留邪者吉少陽三焦膽經主寒熱往來時或驚悸而發搐宜連翹防風湯陽明胃與大腸受病若火太盛毒氣壅結不能傳送而祕結宜升葛湯散火導滯為主防風湯治太陽病身熱小便澀出不快小腸膀胱之病荊芥穗升麻乾葛薄荷大力子防風一錢甘草三分水煎服連翹防風湯治少陽病乍寒乍熱出不快三焦膽經之症連翹防風瞿麥荊芥木通車前當歸柴胡赤芍黃芩紫蘇滑石蟬蛻甘草各等分若大小便利不可服葛根湯治陽明病身熱目赤大便閉出不快胃與大腸之病升麻乾葛白芍當歸枳殼紫草陳皮水煎服辨三陰症治足脛冷腹虛脹尿清色面皎白乳食嘔目睛青脈微沉以上七症不宜服涼藥異攻散治痘出四肢厥冷寒戰咬牙大便自利虛白陷頂大陰脾經受病也人參焦術木香白芍桂心赤苓前胡當歸丁香厚朴陳皮半夏乾葛桔梗青皮附子肉豆蔻各等分姜引水煎服調中湯人參焦術甘草各五分為末蜜丸每服十丸至二十丸溫湯食前下人參白朮散治心不清腹膨脹痘不長泛人參一錢焦術一錢半桔梗八分甘草五分木香三分蓮肉十五粒姜引水煎服辨三陽症治足脛熱兩腮紅大便閉小便澀渴不止氣上促脈洪散以上七症不宜服熱藥若如蠶種如糠粃地枯赤火熱不退宜解表取汗此係三陽受病方列於後連翹升麻飲即升麻葛根湯加黃連連翹解毒丸治痘未出而先發搐狂言亂語四肢痛因外感風寒內發心熱寒水石石膏各一兩青黛五錢共為末用湯浸蒸餅為丸如桐子大每服一丸三歲者半丸看大小加減食後新汲水化下犀角地黃湯治同上或七孔流血衄血不止犀角磨三分地黃浸取汁丹皮二錢赤芍一錢二味水先煎入前二味宣花散治痘青乾黑陷身不大熱便澀此熱蓄於內宜大黃湯下檳榔三枚陳皮甘草各五分黑醜四錢炒共為末百沸湯調下若表大熱者不宜服宜解肌化毒湯黑陷甚者解毒湯地黃膏治痘稠密喘渴飲食宜散下之生地四兩淡豆豉八兩大黃一錢麝香為末以豬膏一斤和勻露煎五六沸令三分去一後入雄麝二味調勻緩緩飲之令毒從皮膚出而愈黃柏膏治同上黃柏緑豆各一兩甘草四兩為末用生芝麻油調敷耳前後至目眶並厚塗之一日二次豬心龍腦膏方見前玉露散治夏月火熾痘大發熱煩躁渴大便結非胃熱相火盛者不宜服生地熟地天冬麥冬枳殼黃芩石斛甘草枇杷葉各等分燈心引水煎服梔子麥冬湯治八九日唇枯焦心熱人參麥冬乾薑升麻甘草梔子水煎服紫草湯治初起痘出不快色不活大便不通紫草木香焦術甘草雲苓糯米一撮水煎食前服清脾散治三四日痘出而地不清毒侵陽位者乾葛升麻黃芩厚朴桔梗半夏蒼朮甘草梔子陳皮各等分姜三片蔥一枝無汗加麻黃壯熱加地骨皮犀角湯治心煩熱衄血不止犀角升麻生地梔子丹皮赤芍麥冬燈心為引水煎溫服以上俱系火症屬三陽宜詳症施治若人事不清呻吟苦楚睡臥不安外多黑陷此其症也增述附後時熱四臟形症聖蒼氏增述夫痘之發也藏於內者有各臟所屬不同彰於外者有時熱形症之異何以見之夫寅卯辰時潮熱呵缺煩悶者屬肝肝之液為淚淚出於水其瘡之色青而小巳午未時潮熱時作驚悸者屬心心主血其瘡多斑色赤而小申酉戌時潮熱面赤咳嗽噴嚏者屬肺肺之液為涕涕濁而淡其瘡色微白而大亥子丑時潮熱乍涼乍熱手足冷多睡者屬脾脾統血所發為疹其瘡色多黃而淺獨腎在腑下不受穢濁故無症耳然骫冷耳冷腎之平正也故以上五臟之症獨見多者即於其臟之毒特甚治之醫者要識此意五臟屬陰然痘瘡出五臟面部先見稀少者為佳六腑屬陽然麻疹出六腑頭面成粒淡多者為妙辨順症凡痘順者始出必自口鼻腮耳年壽之間先見幾點淡紅潤澤如珠三日內陸續而出大小不等頭面稀疏胸背或少或無四肢溫暖神氣清爽乳食如常二便通利不吐不瀉睡臥安穩身涼脈靜痘與肉色紅白分明依期長貫肥滿光澤皮厚堅硬摸之礙手根有紅暈雜症俱無此為氣血依附表裡和平之順症也不治自愈但宜適其寒溫節其乳食而已逆症凡痘逆者多起於天庭司空太陽印堂方廣之處齊湧掀發密如蠶種中有黑點如針孔黑紫乾枯色如赭石形如蚊咬青點如痣紅斑如錦面腫唇焦聲音預變痘與肉色不分壯熱煩躁喘渴悶亂乳食不進上下失血肚腹脹滿腰腿痠疼此實熱極重之症細如㾦子形若水珠皮膚軟薄灰白陷頂慘暗不明平塌不起色如紙白吐瀉不寧乳食不下四肢逆冷神思昏沉此為虛寒極重之症是二症雖有虛實之殊而要皆凶逆之候也險症夫順症不必治逆症則難治其可治者在介於順逆之間而為險症也發熱之時或鼻塞聲重或身痛頭疼或吐瀉作渴或手足俱冷或驚悸不寧或痰涎壅盛此發熱之險也或熱未透而即見苗或痘出齊而熱不退或出而不快或快而不紅紅而太赤赤而微紫此則見苗之險也或當長不長或方長忽定或痘長而肉不腫或肉腫而痘不長或雖長而頂不尖或頂尖而色不順此則長髮之險也或當貫而不貫或貫而不滿或滿而漿清或漿清而皮薄或將成就而色白或將成就而色紫此則貫漿之險也或當靨不靨或自頭以下先靨而頭面不靨或自頭面先靨而遍身不靨或為外剝而膿血不幹或為內攻而臟腑不調或形如豆殼而膿囗為倒靨或身如火熱而誤以為蒸疤此又收靨之險也危急存亡之際顧轉移挽回之者何如耳死症初出紅紫兼發斑五日死初出滿頂連肉俱紅者八九日死班如錦紋及頭面一片如胭脂者六日死痘初如痱摸不得手如湯泡火燒者十日後癢塌而死痘出腰痛不止者死煩躁紫黑口臭者死肉面腫而痘不腫者死未出而聲先啞者死聲啞氣急者死舌卷囊縮目無魂者死吐瀉不止蛔蟲出者死痘出三四日根窠全不起者死痘未見而肌肉中有紅腫如瓜者死頂陷有眼如針孔紫黑者死陷伏腹脹神氣昏迷者死皮薄漿清八九日抓破者死痘與皮肉一般紅者死腹脹滿肌肉黑者死乾枯癢塌空瘡者死泄瀉便血乳食不進痘爛者死二便通目閉聲啞者死痘後驚者死當靨不靨癢塌無膿皮如血殼者死寒戰咬牙噤口手足戰掉者死手足厥冷上過肘膝者死痘雖起脹根窠毫無紅色者死
