body:
  text: 下卷辨血不足而有條凡痘以氣血為主先血泡而後水泡水泡而後膿泡次第而來血為痘之根本心主血清心養血為主若痘初發外為風邪所折遂致熱毒內攻血熱妄行面色光腫名曰毒侵陽位臣欺君也甚則妄行七孔皆流鼻衄不止此謂有餘宜透肌散以清表解肌化毒湯以清熱則血居原位而痘自出矣心煩口燥宜犀角地黃湯以主之若面色皎白根窩欠紅活光澤搔癢者為血不足也宜芎歸湯生熟四物湯活血散之類主之透肌散解肌化毒湯犀角地黃湯以上三方並見上卷芎歸湯治色灰白根窩欠紅活為血不足川芎當歸各錢半紫草白芍紅花各五分半水半酒煎服生熟四物湯治同上當歸地黃川芎白芍各二錢五分半生半熟用酒拌勻煎溫服活血散治血不足色白五六日出不快不紅活四物湯加紅花紫草水煎溫服又方白芍不拘多少炒研細末每服一錢溫酒送下出不宜用防風煎酒送下又方陳皮甘草木通山楂白芍各等分水煎服辨氣不足而有餘凡痘初起泛賴氣以行血血無氣不行肺主皮毛而氣出焉內經所謂調養脾肺滋生氣血是為權度若自汗身不起痘頂陷不紅活者氣不足也宜十奇散四君子湯主之若目陷高起而空虛痘未轉漿而先起喘喝咆哮腫脹口吐粗沫者此有餘之氣也蓋熱太盛毒菀而不發越故耳宜清地散蘇子降氣湯喝起丹蝦鵝四聖散理中湯之類主之緩則煩顛而死十奇散四君子湯清地散以上三方見上卷喝起丹治痘七八日不起而中陷者山慈菇水柘根蘆都梗即山茱萸百鳥不踏根水酒各半煎服蝦鵝四聖散先將鮮蝦一碗煮水二升去蝦以水煮鵝肉熟去鵝用汁鍾半下四物湯煎至八分服蘇子降氣湯治氣喘蘇子半夏甘草前胡肉桂當歸厚朴陳皮各等分薑棗引水煎將蘇子入藥內服辨氣血兩虛凡痘六七日不起泛不紅活不醒漿皮薄甚至心下不清飲食少思二便或利蓋肺金寒脾土濕宜十全大補湯主之當長泛不紅活氣血兩虛宜導赤散大熱不作膿或發搐宜流血飲虛煩心不清宜清心蓮子飲主之十全大補湯治六七日不長泛痘發不起無漿肺寒脾濕秦歸熟地人參川芎黃耆焦術茯苓白芍甘草肉桂水煎服導赤散治當長泛不紅活人參木香甘草白茯各一錢焦術八分藿香五分乾葛五分加糯米一撮水煎溫服流血飲治無汗大熱不作膿或發搐當歸生地人參白茯乾薑桔梗前胡青皮厚朴黃芩梔子半夏川芎陳皮甘草腹皮咽痛加山豆根泄加金櫻子水乾加桑白皮姜引水煎溫服清心蓮子飲治痘不起泛心不清下虛上盛石蓮子骨皮麥冬茯苓人參黃耆黃芩燈心引水煎服辨誤服熱藥凡痘起於三陽或少陽三焦膽經受病而寒熱往來宜四物十神湯加升提藥以治之若醫者誤為寒症投以保元湯木香異攻散理中十全之類加之以風暑成斑者急服陽毒升麻湯治之若誤服熱藥過多則心煩唇裂不起發不光澤急服玄參升麻湯倘腦後頸背出斑多者不治此胃爛肺絕而心血死也此症必於二三日內急退火則生至五六日斑成水枯作泄則死陽毒升麻湯治熱症誤服熱藥成斑方見前加防風白芷玄參升麻湯治溫毒發斑玄參升麻甘草荊芥青黛各等分水煎服荊芥敗毒散治同上人參柴胡甘草桔梗川芎赤苓枳殼前胡薄荷連翹羌活獨活荊芥各等分水煎溫服辨誤服涼藥凡痘起於三陽而三陰未嘗不受症也少陰心腎二經受病腎水枯而心火熾是以狂言亂語自汗煩悶而黑陷以為虛煩宜八物湯四物湯加麥冬防風升提之藥主之則火熄血行而陷起倘誤投以防風通聖散及黃連解毒湯升化毒等湯寒涼之劑則陷伏倒靨而死急服十全大補湯倍加參耆或理中湯保元湯異攻散等藥以救之八物四物理中保元等湯異攻散方見前大全大補湯治誤服寒涼過多倒靨虛陷方見前加升麻白芷麥冬用糯米一撮薑棗引水煎服辨熱泄脾胃者水穀之海而變化出焉大便如常者不必藥或一失調而泄出矣夫泄有寒熱不可不辨脾為心之子心火熾則母病及於子脾受病則不能制水大便因之而泄其色黃黑其氣臭穢是為熱症宜升陽散火用四物十神湯活血散胃苓湯主之火退而泄自止若痘初起而泄一日或四五次至八九次色臭如前此乃有宿食不必藥止苗下泄也若用附子木香丁香肉桂豆蔻峻燥之藥性急亦能速下全谷不變宜溫清和解之劑治之為當夫泄屬氣虛有火有痰有食積穀食不化者氣虛也腹痛腸鳴一陣痛一陣泄者火也或瀉或不瀉或多或少者痰也腹痛而泄泄後痛止者食積也宜分別焉四物十神湯活血散加炒白芍治熱泄胃苓湯治痘長泛熱泄不止加柴胡名柴苓湯厚朴蒼朮陳皮赤苓豬苓澤瀉焦術各五分砂仁桂心藿香各三分身熱加黃芩柴胡姜引水煎服若後重加檳榔又方焦術黃芩甘草烏梅各等分水煎服辨寒泄夫寒泄者脾土受症故也脾為肺之母土愛暖惡濕脾土一寒肺金受病水泛妄行寒泄作矣或為飲食所傷而泄其色白而青其氣甚而不臭是為寒泄宜止泄丸誤服寒涼損傷脾胃吐利不止宜八味豆蔻丸以和中七八日當起而泄宜訶子飲飲食太過水泄不止陰陽不分壯熱煩悶心脾不調氣不升降宜六和湯主之益黃散海上方並宜服至十一二日痘將收而大便通一日一次宜也或利不止痘後無實宜四君子湯送下八味豆蔻丸均氣散香砂平胃散十全大補湯多與飯匙膏茯苓膏時時服之洞泄不止宜鴉片丸臟出不收用馬齒莧為餅敷之加升麻砂仁以升正氣甚者面目青陷哭無淚出身體大熱乳食反多穀食不變名曰除中不治止瀉丸治痘當起寒泄不止赤芩一兩枯礬五錢肉豆蔻烏梅鹽梅各三枚各燒存性為末蒸餅丸如桐子大每服三十丸梅湯送下或作末服二錢亦可八味豆蔻丸治寒泄穀食不化者首尾俱可用肉豆蔻一各面木香砂仁枯礬訶子肉大腹子白龍骨赤石脂煅七次共為末醋丸如黍米大四君子湯送下三十丸訶子飲治七八日當起泛泄不止訶子肉肉果各等分為末鹽梅湯送下一錢六和湯治同益黃散砂仁杏仁人參半夏甘草木瓜白扁豆赤苓厚朴藿香香茹龍眼肉五枚姜三片水煎服益黃散治七八日飲食過多或水泄不止脾土不調氣不升降陳皮訶子肉各錢半丁香三分肉果一枚糯米一撮姜三片棗三枚水煎服海上方鹽梅不拘多少燒灰存性為末好酒送下三錢均氣散治收後泄不止焦朮白芍酒炒陳皮甘草等分為末好酒送下三錢香砂平胃散治收後水穀不分水瀉不止腹痛腸鳴藿香陳皮各五分砂仁蒼朮蓮肉各二錢甘草三分水煎溫服十全大補湯治收後清氣下陷水泄不止方見前加砂仁訶子肉肉豆蔻桂心各等分糯米一撮水煎服飯匙糕即焦鍋巴炒米末可代加蓮肉末拌勻甘草人參煎湯調時時代飲或加山藥末一兩每服入白糖二匙以椒末少許百沸湯調服大有益茯苓糕治水泄不止兼治休息利鴉片丸治痢泄鴉片一分兒茶三釐蘆薈五釐共為末將飲丸硃砂為衣如桐子大每服一丸至十丸紅痢黃連湯白痢薑湯宿食青黛湯下師鑑按證治大還載王氏胃靈丹治泄瀉自汗用蓮肉一兩去心鴉片二錢每服五分白湯下宋氏加橡斗子五倍枯礬龍骨訶子肉豆蔻茯苓名駐公車一方用炒元米赤石脂枯礬龍骨訶子肉豆蔻五倍乾薑木香砂仁粟殼蜜子炮北司馬西溪公一孫年甫四歲痘出作泄臟出二寸命懸一線諸醫莫治延予視予問諸醫咸曰痘痢予對司馬公曰治症不難辨症為難公子水泄非痢也公曰何以知之予曰泄白者乳直出非傷氣也將飯匙糕一合蓮粉二兩加山藥五錢白糖五錢令乳母嚼而食之自晨至食大便已成糞矣司馬公喜甚詢其成功何以如是之速予曰脾土惡濕土宜稼穡而喜甘飯匙得火氣以溫脾是以成功易易耳辨嘔逆不食大胃為中州飲食出納而元氣具焉胃氣一暢則無陷伏倒靨之患苟不順規而嘔逆作矣嘔者寒熱虛煩發熱而嘔也嘔而無物是胃熱宜小柴胡湯益元梔子麥冬之類嘔而有物飲水即吐涎沫不止頭痛身熱膈上有寒痰者是胃寒宜正元平胃等湯主之遽欲嘔食作停上膈痰氣壅盛而嘔先用鹽湯以吐之此所謂上者越之也後宜平胃散人參養胃湯或為水穀所傷霍亂嘔逆宜藿香正氣散小異攻散主之或為風寒所折而嘔可用橘皮湯或停痰嘔逆不食用二陳湯或嘔不止胃火盛也益元散梔子麥冬湯主之夫嘔吐有二嘔而有食謂吐屬寒嘔而無食為逆屬熱所當詳辨小柴胡湯治胃熱而嘔此方似誤用者審之柴胡藿香草果半夏乾薑木香赤苓姜三片水煎服人參養胃湯治同上人參藿香草果半夏白朮厚朴蒼朮陳皮甘草各等分用糯米一撮姜三片棗二枚水煎服藿香正氣散治水穀傷胃而嘔逆藿香蘇葉白芷厚朴半夏赤苓桔梗木香陳皮甘草腹皮壯熱加人參砂仁姜三片棗二枚水煎服小異攻散治水穀傷胃而嘔逆導壅滯之逆氣人參一錢茯苓陳皮各八分木香甘草各三分龍眼肉二個水煎服二陳湯治胃寒停痰而嘔陳皮甘草半夏茯苓砂仁寒甚加乾薑姜三片水煎服益元散治胃火盛乾嘔無物方見前辨痰咳喘逆凡痘疹初起之時或為風寒所折而生痰咳心火動肺故也宜參蘇飲輕清和解或原有積虛損元氣痘發而生痰咳者宜人參養胃湯或用藥太過藥性不和而咳喘者宜清心蓮子飲或精元耗散腰疼氣促而喘者宜三子養親湯或肺氣不足痘出而聲不出作痰咳者宜五味子湯或葶藶木香湯或不咳而痰多者二陳湯加貝母詳症治之若寒客於中氣不得伸而喘則當溫之宜陳皮乾葛半夏薑湯主之熱客於中氣不得伸而喘則當逐熱以清之甘草瀉心湯主之參蘇飲治痘初出為風寒所折而痰咳喘逆人參紫蘇廣皮半夏枳殼乾薑茯苓前胡乾葛咳甚加連翹麥冬用姜引水煎服清心蓮子飲治用藥太過性不平和而作喘痰蓮心八錢甘草二錢燈心為引水煎熟食蓮心湯少飲之妙三子養親湯治精元耗散腰疼氣促而喘咳菟絲子一錢酒炒九蒸搗如泥茯苓當歸人參各一錢焦術黃耆車前子各五分甘草三分豬腰子一副為引水煎溫服用公豬腰子火焙乾徐徐食之此方得之甚難非惟可以治症凡下元虛弱痰咳者加黃芩麥冬可服五味子湯治肺氣不足痘出而聲不出喘咳者人參五味麥冬杏仁廣皮各等分水煎服葶藶木香湯治心火盛脾土燥結二便不利喘咳嘔逆木香焦術茯苓葶藶豬苓澤瀉桂心滑石甘草各等分燈心引水煎服甘草瀉心湯治熱火上行肺氣不伸甘草人參各三分黃連半夏各五分乾薑黃芩各二錢棗頭十枚水煎服白朮五味子湯治同上焦術五分半夏廣皮甘草各三分五味子九粒雲苓一錢姜三片水煎服四逆生薑湯治寒客於中當歸一錢白芍八分通草五分桂枝三分吳萸一分姜三片水煎服辨諸痛內經曰諸痛瘡瘍皆屬心火是以諸痛為實屬熱初起之時腠理不密必為風寒所折宜分而治之凡紅點出見中寒邪而熱頭腦遍身作痛起於湧泉遂及兩膝宜四物十神湯解表以驅風則痛止輕者消毒飲若腠理不密腹脹疼痛氣虛不能導血鳩尾骨痛而連及於腰宜加味四物湯加以升提之藥活血均氣等散主之若痘初泛而皮膚痛及腹痛者不必藥若渾身如被杖不可轉側此中濕之痛宜黃耆建中湯主之四物十神湯方見前消毒飲治初起渾身及腦俱痛者牛蒡荊芥各一錢防風甘草各五分水煎服加味四物湯活血飲方並見前黃耆建中湯治中濕渾身疼痛黃耆錢半白芍二錢桂枝甘草各三分加薑棗水煎服均氣散治同上烏藥人參甘草焦術茯苓青皮木香白芷陳皮各等分水煎溫服辨諸癢諸癢屬寒為虛惟起三四日遍身癢如蟲延此毒發於肌肉間症之至順不必藥至七八日灰白色陷頂而癢者表虛也宜十全大補湯百花膏塗其面喝起丹蝦鵝四聖湯宜並服如爬破用二白散若將收作癢肌肉自生不必藥爬破出水敗草散敷若面收完而身不收因而作癢者此毒氣上凝而腫不散是以面收而身不收面上癢甚不可忍者宜解肌化毒湯連進以消其毒苟誤認為虛癢而峻補則小便出血呻吟而死十全大補湯治七八日虛寒作癢方見前癢甚加穿山甲半酒半水煎服三物湯治同上炙甘草一兩蟬蛻薑汁泡去泥百花膏石蜜不拘多少同湯化之時時抹上喝起丹蝦鵝四聖湯二白散方並見前敗草散治收後出水蓋牆頭多年爛草去塵土炒為末敷之解肌化毒湯治面收身不收癢不可忍者方見前辨癰疽毒痰凡初起之毒氣太盛而不發越流於三陽之經則腮項結塊腫痛宜防風敗毒散流於三陰腫發四肢手腕膝腫宜十六味流氣飲氣血兩虛灌漿不起半收者必腫毒焮發宜八物湯大補氣血收急則生熱毒荊防敗毒散必勝膏塗腫處或經驗秘方初起咽喉腫甚名為痘母宜防風通聖散下之反得輕者多矣荊芥敗毒散治三陽症毒生腮項收急生熱毒荊芥防風人參柴胡甘草桔梗川芎赤苓枳殼前胡薄荷連翹羌活獨活痛加燈心乾薑燈心引水煎服十六味流氣飲治毒入三陰手足二腕腫毒人參川芎當歸白芍防風木香桂心黃耆白芷桔梗檳榔厚朴烏藥甘草枳殼紫蘇各等分水煎溫服大便自利加附子三分大便實加大黃二錢防風通聖散治痘生於咽喉方見前經驗秘方將黑豆綠豆用醋浸水研初起時時刷抹隨手而退痘後腫毒經驗餘論子觀痘毒蓋緣膿血不足半漿而收毒氣未盡生於四肢初發紅腫者為陽易愈若光腫白色而頭頂不見骨里疼痛轉側曲直甚難屬陰難愈宜人參養榮湯俟其氣血充足自然全愈若用寒涼之劑或用針灸敷貼則氣血易虛必致肌肉漆黑不旋踵而死矣子於武寧一少女痘半漿而收右膝光腫不能曲直諸醫欲行針灸予執以為不可其父疑信相半女因畏針勉從吾說日服養榮湯一貼漸覺症輕至十日方出膿少許二十日外復舊始知予言不妄不然殆矣憲副李淵弟洲四十外生一子甫十歲痘出收完耳後生一毒見不甚腫爛肉沉黑知因服寒涼過多所致予憫之謂必得焮腫方成膿而愈若延日久定生痰喘人將予言對醫言之不信予言反謂向已腫矣尚欲其何如腫耶予聞而嘆曰死期至矣一日後果喘作請予至半途而返內經曰脾主肌肉肺主皮毛服寒涼過多肺寒脾濕安得不痰喘而亡哉姜學士思藝一孫種痘方見點痘母生於咽喉頸大於面倉皇無措延予視予曰非下不能散恐加痰喘不治矣學士堅執不可至晚痰喘作公子慌甚謂曰事當從權以行下藥私與之可乎予曰可果以通聖散倍硝黃下之次早腫毒已消反為輕症以告學士學士嘆曰幸公行權若執不可下幾誤大事辨汗後不解凡痘初起始於太陽經頭疼腦痛肢體骨節皆痛者以發汗為要法汗之體松地清痘乘汗出其痘乃順倘汗後不解者蓋緣表邪未盡或邪勢在內或汗之太過邪氣乘虛而克所以反惡寒者虛也宜芍藥附子湯主之不惡寒而惡熱面赤皮紅者實也宜透肌散調胃承氣湯主之汗後飲食不進者少與水飲之令胃氣和而愈也芍藥附子湯治汗後體虛惡寒芍藥當歸各二錢熟地一錢川芎甘草各五分虛甚惡寒加附子五分水煎服調胃承氣湯治汗後體實惡熱枳殼厚朴甘草大黃各三錢芒硝一合姜五片水煎服辨下後不解夫痘疹不可妄下若夾宿食以致胃爛或水泄不止此名臟結予立汗吐下三法病熱危惡於此不可不下下後邪氣乘虛而未散或壅塞而未盡則當審其虛實以治之下後水泄不止內有結糞壅滯是以谷不來而水泄者泄有水而無糞宜大承氣湯再下之身熱不退心中結痛梔子豉湯主之胸滿心煩梔子厚朴湯主之若汗吐下之不若識寒熱虛實之允當斯可收萬全之功矣大承氣湯治臟結梔子豆豉湯治下後心中結痛梔子九枚香豉一合甘草五分知母一錢水煎服梔子厚朴湯治下後心煩胸滿梔子九枚厚朴二錢枳實一錢水煎溫服建昌懸桂堂李前峰年三十六種痘八日內水泄不止一日夜三十餘次有水無渣心中懊憹痘將黑陷目赤皮紅延予視予曰此謂臟結毒壅不通非大承氣湯不足以濟事眾曰果有此定力乎予曰泄有水而無渣非結而何乃以承氣湯一服下結糞如拳三五塊堅硬如石下後思食痘轉黃而泄止辨乍寒乍熱夫痘以氣血相等為正倘邪氣分爭則為寒熱往來邪與陽爭反發寒邪與陰爭反發熱此表邪未盡而內毒壅滯痘腳輕鬆調其乳食倘色淡膿清而寒熱往來宜十全大補湯解肌化毒湯辨痘汗夫痘以汗為主太陽無汗渾身乾燥此為惡候倘遍身汗出謂之發越熱氣越於四肢也毒壅於內瘀血在裡不能發越遂至火毒內攻鬱於陽經頭乃諸陽之首是以頭汗出而身焦枯痘乘熱出則矇頭蓋而知其熱毒瘀血於內所致也宜黃連解毒湯倍芩連枳殼令熱火降下甚者梔子麥冬湯主之庶可保全黃連解毒湯治頭汗身干黃連一錢黃柏一錢半黃芩三錢枳殼半個水煎溫服梔子麥冬湯治同上梔子九枚連翹甘草各三分薄荷竹葉各五分黃芩錢半熱加大黃三錢姜五片水煎服辨失血夫人一身氣血為主氣血行一身猶水行於地中水循故道則無崩潰氾濫之患氣血流斯無壅滯瘀蓄之憂若為邪熱火毒所攻而不行始為蓄血終為瘀血甚則妄行而七孔皆出痘未出而先吐血者三物湯主之或犀角地黃湯救之俟其血止恐元氣傷而痘不出以生熟四物湯救之倘血從下行大便血出而成黑塊者不治相格論曰泄盡死血若成塊少者莫醫此之謂也痘出生水大便血不止色紅活而無塊者解毒湯倍用芩連歸尾導之去其瘀滯其大便血止然後徐徐養之為當三物湯治痘未出而先吐血者黃連黃柏黃芩梔子各等分燈心引水煎溫服犀角地黃湯治同上犀角磨汁生地五錢搗汁白芍三錢丹皮二錢升麻一錢血甚加茜根五錢蒲黃三分先用諸藥煎湯次將地黃汁入內同服生熟四物湯解毒湯方並見前武寧三山王氏一子痘將齊七日內大便混血而無糞一下有半碗許晝夜十餘次初視予以為不治及詢其苗下泄醫者誤以峻補之藥補之以致血下盈盆予曰可救矣此謂邪熱內攻血故妄行流入大腸經非通利莫救也隨以黃連解毒湯加歸尾大黃通導一服而愈辨發渴痘疹從里出表熱毒蒸未有不發渴者然渴亦有二焉一則熱甚於內銷爍津液一則汗泄過多耗奪精液治法不過損有餘補不足火毒發狂煩躁引飲壯熱喉痛辰砂五苓散人參白虎湯主之渴欲得水者可少與之但勿令其過也收後大渴引飲便多隨飲隨尿虛火所致宜大補湯主之夫渴有真渴假渴引飲不止者為真渴胃火熏炙宜梔子麥冬湯五苓散主之呷一二口停而復飲者為假渴是內無熱而虛煩之渴也宜生脈散主之於此不可不辨辰砂五苓散治大毒內蒸發渴方見前如渴甚加天花粉白虎湯治同上方見前糯米引水煎服生脈散治假虛渴人參一錢麥冬二錢五味子九粒水煎服一少年種痘收完發渴將天花粉入大鍋煎數十碗飲不能止自投水缸而飲小便長出如竹筒建缶之狀上入下出莫有能治者予視而嘆曰虛宜實宜大補主之以十全大補湯服而愈辨多眠語云病人思睡如魚得水然多眠亦有二焉痘起泛毒氣發於皮膚間內臟無病及將收半神清氣定多眠不必藥若痘已起泛醒漿灰白及將完多睡此神昏氣弱或精神恍惚或服寒涼太過故爾多睡宜四逆湯小建中湯大補湯並宜主之治法當以外症為治焉四逆湯治痘起泛灰白色多眠並下利方見前小建中湯治收後多睡神昏氣弱精神恍惚服涼藥太過人參一錢白芍一錢大附子生薑肉桂各三分龍眼肉大棗各五分水煎服辨不眠痘疹宜睡多醒少者為正而煎熬者亦有之蓋緣汗為心之液汗多亡陽心血不足故不眠宜四物湯以養之心血盛而神不清亦不眠宜解肌化毒湯以主之胃中大熱火鬱於咽錯言妄語呻吟不眠宜黃連解毒湯主之收後精神虛耗魂氣不定亦不眠宜黃耆建中湯主之收後宜眠不眠者何也毒氣與諸陽相併陰氣未復故也身有餘熱補中益氣湯常服之四物湯解肌化毒湯黃連解毒湯方並見前黃耆建中湯治收後不眠黃耆一錢人參八分肉桂甘草各五分白芍七分龍眼肉五枚水煎服辨收不過關凡痘十日而收至十二日而已收完至頸不收者其故有二焉一則毒氣太盛上凝不散遍身漿滿滿面收完作癢不能忍者宜急服解肌化毒湯或敗毒散連進遏毒不行則癢止痘收一則服寒涼太過面部漿滿身上漿清者宜先服十全大補湯加麥冬山楂牛蒡子急救之否則面收身不收渾身作癢必喘渴氣粗而死悔無及矣辨收後顛狂不眠凡痘收完精神日足心清氣定常如平日者吉若顛狂不眠狂言亂語如見鬼狀甚則持刀傷人逾垣上屋日夜不止者此火毒留蓄心經以致痰迷心竅正氣初復陽氣重盛陰血虧虛陰陽交剝故多言不眠宜陽毒升麻湯主之倍加滋補以助陰此扶陰抑陽之意痘生於五臟屬陰而然也陽毒升麻湯治火毒留於心經以致痰迷心竅顛狂不眠升麻犀角人參射干黃芩甘草各等分燈心引水煎服滋陰降火湯治收後顛狂不眠當歸熟地麥冬各一錢人參焦術茯苓白芍各八分黃芩牛蒡各五分川芎連翹甘草各三分牛黃一分圓肉五枚糯米一撮水煎溫服張方伯二侄種痘各半月後一者雙目不能開一者顛狂雙目不能閉予視之曰開閉之權在我矣今不能開者未通大便名為臟結是以毒凝不散以潤腸湯一碗許飲之不半日即大便熟睡一覺醒即目開其不閉者毒注心經陰陽交剝以致顛狂飲以滋陰降火湯連進二服則睡而目閉方伯笑謂予曰藥用合宜肉湯亦靈矣咽喉腫痛舌疔疳鵝夫咽喉之症太陰脾肺之氣邪熱乘之以薰膈故生腫痛又因熱毒蘊蓄於胃中飲食少進腸胃空虛三蟲求食蝕人五臟名為狐惑上食其喉為惑其聲啞嗄傳及舌齒為疳鵝下食其肛為狐甚者內食其臟而死治法宜泄其胃火以黃連犀角湯主之玉鎖匙時時吹入其口內以治標恐舌爛而死水火既濟丹為甚妙若痘起泛八九日內服補熱之藥太過遂致牙齦脫落可不慎與黃連犀角湯治咽喉口舌生疳犀角三分黃連錢半石膏五分木香一分烏梅七分熱甚加黃芩梔子炒蘆薈五分水煎服玉鎖匙冰片硼砂一錢硃砂文蛤雄黃五分兒茶三分共為細末吹入口內徐徐以煎藥湯送下水火既濟丹治疳熱黃連乾薑等分為末吹入口內流涎即愈海上方治同上烏梅煅存性枯礬黃連各等分研為細末吹入口內又方夏月取糞蛆置水內蛆自浮於水面洗淨攤新瓦上火焙微焦如芝麻色研成細末聽用吹入口內連吹三次疳自消矣孕婦用藥次第夫孕婦賴氣血以為主血熱妄行而胎於是乎動矣天一生水地二生火孕婦身熱脈亂汗出不食嘔逆惡阻是水火交爭也三月得木氣精血結聚氣和榮子子氣潤母四月得金五月得土痘初起值二七月乃水火交爭胎動必不能安主舌黑而青夫心乃舌之主舌乃心之苗黑而青者腎水克心火也宜先服罩胎散以固孕令熱氣不侵損胎元身熱甚者木香參蘇飲胎將動惡露未來宜安胎散氣血兩虛獨聖散胎已下氣血虛甚保元湯十全大補湯十奇散若陽虛則外熱陰虛則外寒寒熱時作宜大補氣血若面赤唇口俱青口吐沫者子母俱死夫面赤者心火勝而血乾主子死唇口青而吐沫乃肝木克脾土胃絕而子母俱死罩胎散治孕婦初起服此以保胎忌丹皮乾葛當歸生地白芍各二錢黃芩麥冬陳皮甘草川芎白朮前胡砂仁各五分阿膠二錢糯米一撮水煎服大熱加鬱金蘇葉荊芥穗水鍾半煎一鍾服又方乾柿蒂七個野苧根一個甜瓜蒂一枚用銀器煎以荷葉蓋定煎八分去渣仍用荷葉蓋定空心溫服木香參蘇飲治孕婦一一日身熱甚人參蘇葉桔梗前胡各二錢廣皮茯苓枳殼木香各五分水煎服獨聖散治身熱胎動砂仁蓮殼不拘多少斫為細末酒調服一錢復覺腹內熱加黃芩紫蘇大腹皮煎湯送下三錢此方多服亦好海上方婦人油發燒灰溫水調服立安惡露來亦可服安胎散又名十聖散治身熱胎動人參腹皮各八分酒炒白芍蘇葉黃芩各一錢焦術茯苓川芎香附續斷當歸陳皮甘草砂仁各三分炒斫燈心姜引水煎服十全大補湯十奇散方並見前二方穩當兼下保元湯用保元湯治胎已下氣血兩虛人參白芍熟地歸身各一錢黃耆川芎厚朴各五分甘草廣皮各三分姜引水煎服產後虛熱加炮姜血少加生地血來多加炒黃芩凡痘胎下於未痘之先血乾氣促渾身壯熱一齊並出不治下於出齊之後痘腳輕和稀少明亮保元湯時常服之若氣急衝心小便溺血不止痘出赤黑壯熱不除嘔逆心煩腰背僵直唇舌青黑口吐涎沫或四肢逆冷遍身不起如此數症恐仙亦無救予願同志者用心詳玩焉辨收後餘毒痘疹初起症候多端收後餘毒亦是不少或瘡痂漸落延至二十日或一月或四五十日而死者不無予於此詳症立方以便後學凡十日當漸結痂靨眼開目清唇舌轉紅痂邊白黑精神日固飲食日加二便如常身無大熱者不必藥若收至咽喉收不過關多眠易醒精神倦怠飲食不思者死收後兩腳虛浮而出黃水乃毒氣未除宜消毒宣風散大熱日乾心煩宜柴苓湯收後身熱二便不利口開眼閉宜升麻正氣散餘毒大作大熱不除四肢浮腫宜防風通聖散餘毒不除煩渴吐瀉宜人參麥冬湯主之毒流四肢而生疽毒宜柴胡門冬湯荊芥敗毒散大便秘結腹脹咳逆宜前胡枳殼湯毒氣不除咽喉腫痛宜玄參升麻湯虛煩盜汗宜四順散大便不利宜解毒湯大熱心混顛狂不清咳嗽吐血宜益元散痘將收毒氣不散宜滅斑湯四聖散收後失聲天花散過用寒涼脾土倒弱水泄不上宜四君子湯送下豆蔻丸又當於寒泄條參看收後若毒上凝面腫不散兩目不閉潤腸湯收後顛狂不眠別有條例消毒宣風散治收後兩足虛浮而出黃水升麻乾葛人參麥冬甘草防風茯苓石膏荊芥白芷牛膝防己漢忍冬藤大腹皮咽喉痛加牛蒡子大便秘加枳殼咳嗽加款冬花氣喘加烏梅香附腹痛加青皮蘇梗糯米一撮加燈心水煎服柴苓湯治收後口乾心煩大熱柴胡豬苓人參焦術澤瀉茯苓肉桂半夏甘草黃芩滑石姜引水煎服若泄去滑石防風通聖散治收後餘毒不除四肢浮腫防風荊芥當歸桔梗梔子連翹甘草赤芍黃芩薄荷牛膝半夏人參集焦術石膏咽喉痛加牛蒡子大便秘加大黃四肢浮加木瓜水煎服人參麥冬湯治收後餘毒不除煩渴水泄人參麥冬甘草陳皮焦朮厚朴牛蒡各等分水煎服荊芥敗毒散方見前前胡枳殼湯治收後餘毒大便秘腹脹咳逆前胡枳殼赤芍大黃甘草姜引水煎服玄參升麻湯治餘毒咽喉痛玄參升麻黃芩熟地甘草燈心引水煎服益元散治收後大熱吐血心煩顛狂方見前滅斑丹治收時毒氣凝結於面其色黯然輕粉龍粉為末新豬油調成膏搽上愈四聖散治收後火毒痘疔珍珠七粒豌豆五粒燒存性油發燒為末以胭脂水調用針挑破搽上師鑑按證治大還載一方治痘疔名三仙散用地丁番白草歸尾三味水一碗酒二盞煎服宋杏莊加天黃八分紫草茸二錢五分用又按周慎齋治痘毒用牛黃一錢二分硃砂八分珍珠三分共為末口嚼胭脂汁調搽天花散治收後失聲天花粉桔梗焦術訶肉菖蒲甘草共為末水調一錢服豆蔻丸治收後過寒涼脾土倒水穀不化泄瀉不止潤腸湯治收後毒上凝面腫目不開辨咽喉腫痛咽喉痛而腫者胃火薰蒸故也面赤唇焦色青黑舌苦而痛者不治舌尖如火宜牛蒡子湯輕則甘桔湯痰盛胸高咽喉不利宜芩連枳殼二陳湯甚則玉鎖匙點舌以救之若毒氣流於三陽經腮項腫痛宜荊防敗毒散面仰頸直而痛毒氣凝結為害不治荊防敗毒散治毒氣流於三陽咽喉作痛方見前鼠黏子湯治咽喉痛甚牛蒡子二錢炒射干一錢甘草五分山豆根三分磨汁燈心引水煎服甘桔湯治同上甘草桔梗防風麥冬各等分水煎服芩連枳殼二陳湯治咽喉下氣黃芩八分枳殼一錢黃連赤苓連翹桔梗各五分貝母八分陳皮甘草各三分痛甚加山豆根水煎服玉鎖匙治咽喉水穀不通方見前服藥不過關夫胃為水穀之海出納司焉一為痰氣凝結脾氣不能運化老痰流於胃脘中飲食為痰所阻不入胃中頃刻間即吐束手無策者多矣予制一方品味極少其效甚速其功甚大特錄之以示後學者不惟痘中藥不過關可用凡服藥不過關者俱宜用名曰透關散透關散治服藥下咽即吐並飲食不能入者多年鏽鐵去泥洗淨刮下鐵鏽不拘多少研為細末聽用用時將好醋大半盞調鏽五分服二呷隨將湯藥飲之即納辨兩目瘴翳兩目者一身之精借日火以為明如日月之麗於天也苟失所養如日月薄蝕萬古皆長夜丹溪云痘未出之先以牛蒡子為末砂糖調敷囟門預防眼患良有以也夫目有內外內皆屬腎得黃中之正色外皆屬膀胱得玄黃之正色及脾胃之生氣是知無患矣雖有五輪八廓惟中外屬臟外則應於五輪白珠屬肺應氣輪黑珠屬肝應風輪上下眼皮屬脾胃應肉輪大小眥屬心應血輪瞳人屬腎應水輪若眼胞陷沒是五臟皆絕凡痘起泛之時七八日內目必腫閉上皮高起四圍眼皮陷入無淚者不必藥若痘已收眼開黑白分明淚不流者亦不必藥若痘起泛或二日或一日淚流眼皮紅腫及焮於外者熱毒侵睛必隨其藥內用荊芥白蒺藜治之外用洗方洗之俟痘收後隨症施治如氣血兩虛熱毒上攻宜四物龍膽湯餘毒入眼翳膜遮睛用穀精散面腫不消兩目光腫不汗宜吹耳法服荊防敗毒散磨翳膏若兩目腫宜消毒散其瘼堅厚為難治弩肉侵睛為翳遮睛亦不治洗眼方治痘當起泛兩目流淚紅腫疼痛蛤粉一錢輕粉三分為末百沸湯調將筆蘸水周圍搽洗四物龍膽湯治氣血兩虛熱毒上攻目生翳瘴紅腫淚流龍膽草當歸各三錢生地白芍防己蒺藜各一錢炒去刺川芎五分腫甚加荊芥白芷燈心引水煎服穀精散治毒八日生瘴穀精草生蛤粉生黑豆各二兩為大用宰豬肝半斤竹刀切片相連將藥入片內扎固入磁罐內文武火煮熟去藥水取肝食之又用兔丸煎湯代茶亦可吹耳法治收後面不消腫兩目生膜輕粉一錢黃丹二錢為細末患左目吹右耳患右目吹左耳荊防敗毒散治收後面不消腫兩目生膜荊芥防風連翹白芷歸尾蒺藜川芎羌活生地赤芍木賊梔子枳殼草決明青葙子大力子龍膽草甚加青皮大黃穀精草水煎服磨翳膏治白翳遮睛蘆甘石用薄荷甘草煎濃湯煅石七次用田螺硼砂水蜘蛛絲制珍珠五錢用豆腐包飯上蒸蕤仁硼砂麝香各等分冰片螵蛸煅白丁香各三分熱甚加黃連末六分癢加膽礬一分煅上藥如法制為極細末切勿造次眼藥膏一名卷翳膏蘆甘石三錢制過硼砂一錢冰片硃砂白丁香各二分為極細末入磁罐內聽用點翳方治收後目生熱瘴內有白翳如米粒大者隨手而退蜘蛛一個取腹內絲象牙末奶乳食鹽上方先將大燈心一根蘸蜘蛛絲於燈心頭上次蘸鹽再蘸乳又蘸牙末點眼白膜上隨手放燈心於眼內令患者眼皮含住燈心痛止方開取出燈心其眼能開次日如前再點一次則膜去矣妙不容言又名風捲云又方治不拘遠年近日翳膜瘴睛制硇砂如法用活田螺三五個養去泥沙洗淨俟其吐肉將硇砂入於螺內仰安於盆內即化成水傾螺水於碗內將蘆甘石升打過者再燒再淬以螺水盡為度如前制過取大蜘蛛數枚用腹內絲同蘆甘石五錢蕤仁五錢去油為極細末點目內去白膜入卷翳膏內同用神妙不可言傳瓊玉膏龍腦五分為末蕤仁去油硇砂為末熊膽一錢牛黃一錢黃連一兩蜂蜜一兩上用熊牛蕤連四味取長流水二大碗於磁罐內熬至半碗將重綿濾去渣入蜜再用文武火煎至紫色點起牽絲為度切勿太過不及取出入硇砂龍腦末和勻貯磁罐內封固聽用不拘遠年近日點療眼疾如神辨火攻法治痘自古無火攻惟吾獨用之臥龍先生云利於水者必不利火吾故曰傷於水者惟火可以救之一少年牧鵝于田阪痘疹及身初不自覺值風雨大至臥田阪中不能行雨過負歸口吐白沫兩目直視四肢僵直予以紙燭照之痘已見苗矣予曰痘苗尚活豈可置而不救耶用藥不能入法已窮矣予思武侯之言用火攻之於是將燈火自湧泉承山鳩尾脊骨自下而上逐節燒之燒至背心能作聲至肩井大汗自出目睛轉而出沫止隨進四物十神湯一服而愈後得轉輕辨收後浮腫夫水土者人身所賴以為生也脾土一虧水無所制則氾濫妄行而腫脹之患生矣凡痘收後四肢瘦減二便如常飲食日加瘡痂漸落肌肉紅活者無他症或為飲食所傷精神倦怠飲食少思痂落無紅與肌肉相似鄭聲不止此脾土受病熱蓄於內積滯不通遂成土不制水大便稀而小便短水泛妄行四肢浮腫眼生臥蠶陰囊光大故標本論云少陰為標相火為本瘡瘍癢痛暴注下迫水液渾濁之疾生宜先以胃苓湯分理以發其源次以五皮二術散開導以通其流又以禹功神授丸疏利以決其壅俟其水涸用木香流氣飲以固其本大痊後用香砂平胃丸以實其脾令無潰溢重複之患此治土不制水之大法也若臥蠶不見陰囊不腫而腹大胸高面目四肢浮者此係胃有積滯脾氣不行榮衛不通是以靨痂落而無紅四肢虛浮宜四物湯加麥芽山楂枳殼消導之未可作水濕妄行而治大進藥之方自有次第先一日進胃苓散一服二日進禹功神授丸三日進湯藥四日進丸如是不可造次一日腫消只服湯藥丸不可進若大便泄腹內疼二者兼全不可治矣若有泄無疼有疼無泄皆可治也胃苓散一日先服分理以發其源豬苓澤瀉肉桂焦術厚朴茯苓蒼朮廣皮甘草水煎溫服五皮二術散二日服開導以通其流赤苓皮大腹皮丁皮五加皮姜皮焦術蒼朮炒甘草豬苓澤瀉木通青皮香附木香各等分燈心引水煎服禹功神授丸三日服疏利以決其壅廣木香黑醜大戟用皮甘遂二錢半生半熟各等分各將一半草紙包火內煨熟曬乾一半生用為細末飯為丸如桐子大燈心湯送下三歲五分十歲八分十五以上二錢人盛者二錢一服則中焦消二服則面消三服腰腳俱消連進湯藥共七服遍身俱消不忌鹽服香砂平胃丸一年方止無重患之憂此方味少而功極大妙不可言木香流氣飲消後服一二劑以固其本木香厚朴青皮甘草蘇梗香附廣皮肉桂檳榔丁香蓬朮藿香木通草果木瓜當歸白芷麥冬焦術人參赤苓腹皮各等分燈心引水煎服香砂平胃丸痊後服此以實其脾一年方止每日吞二次藿香砂仁蒼朮厚朴陳皮甘草上藥不拘多少製為細末醋打糊為丸如桐子大每服百丸日迸二次或沸湯或酒或米湯俱可送下痘疹三不治症一症少婦痘初起一二時不自覺而與夫交為陰易名曰房勞症色白不起泛咽喉痰閉或一齊湧出無治法一症痘初起時胃火動而欲食自不覺而多食不久而食未化大傷脾胃胃氣不行以致脾不流血胃爛成班甚者三四日而死予思食已化者可下食未化者可吐惟欲化未化不吐不下而術窮矣是以不治一症初至六七日熱蒸皮薄毒注臉面不能發越爬破之在氣血交會之時將敗草散敷其破處用升提補氣血之藥助其不足令痘翻灌庶或保全十二三日破者氣離血散毒盡而痂成敷之亦可至於九十日內將收未收因而爬破者泄其真元痰癢俱作百症齊生欲提而無毒能提欲補而氣血不能驟補只得袖手待斃亦為不治小兒麻疹俗名痧子凡小兒麻疹原於六腑蘊積熱毒所成有甫生半月而種號曰胎麻人生無不種者症與痘症傷寒相似或為時氣傳染發於皮膚之間有再種而至三種與痘症終身一種為少異一發則遍身為之紅活其色紫赤者吉紫黑者凶初起憎寒壯熱吐瀉咳嗽交作不思飲食面赤眼光噴嚏痰涎或五六日而出或七八日而出本無定期治法亦與痘症不同痘症原於五臟屬陰麻疹原於六腑屬陽陰宜補而陽宜泄切忌丁香肉桂豆蔻附子辛燥之劑痘宜汗以行疏利之法四物十神湯之類麻宜輕清和解升麻乾葛白芷之類務宜斟酌初起用升麻葛根湯麻見亦可用咳嗽甚者用參蘇飲或防風通聖散主之麻略具苗而泄者五苓散加薄荷葉治之熱甚者去桂用四苓散調六一散同服麻不見出身熱腹膨用白虎湯加人參最當煩渴不止壯熱不除化班湯宜速進數服熱退渴止為度熱壯譫語煩躁宜黃連解毒湯加大黃枳殼甘草花粉主之夫麻疹非寒為熱所協以致穀食不化宜用消毒湯熱火熏膈咽喉腫痛宜甘桔湯加玄參大力子以治之或聲啞發喘宜小陷胸湯若無他症但餘熱不除宜黃連解毒湯調六一散以調攝之治麻之要大率先解表而後清肌萬無一失其症未愈不宜補恐熱積於內以成狐惑收後虛弱方滋養氣血溫補脾土為當一麻症發熱之時憎寒壯熱鼻流清涕身體疼痛咳嗽泄瀉疑似未定服葛根湯去砂仁陳皮取微汗輕清和解則皮膚通暢腠理開豁而麻易出不可重汗恐致亡陽必以蔥白湯時時飲之而無發搐之患一麻發之後避風寒忌生冷苟一犯之則皮毛閉塞毒氣壅遏變紫黑而死矣渴甚欲水以蔥白湯飲之以疏孔竅一麻初出乾燥暗晦色紅紫乃火盛毒熾宜六一散解之或四物湯去地黃加紅花炒黃芩黃連治之一麻症隨出隨沒乃為順症或出二三日不沒者內有虛熱宜四物湯主之如失血用犀角汁解之一麻症壯熱不除飲食不進並屬血虛血熱宜四物湯主之隨症加減渴加麥冬犀角汁嗽加瓜蔞仁痰加貝母陳皮去白切忌人參焦朮半夏一或誤用為害不小蓋麻疹為陽血多虛耗宜滋補陰血其熱自除所謂扶陰抑陽之義一麻收後牙根腐爛鼻血橫行併為失血急用四物湯加茵陳木通生犀角之類以利小便使熱氣有所滲而出如疳瘡色白為胃爛不可治矣一麻症泄瀉當分寒熱新久新瀉熱瀉者宜四苓散加木通寒泄百中一二宜理中湯一服而止久泄用豆蔻丸或訶子粟殼灰酒調服澀之一麻收後不避風寒終身有咳嗽之患一麻疹前後大忌豬肉魚酒雞子恐惹終身之咳只用老雞精火肉煮爛而食以助其滋味可也一孕婦種麻以四物湯服之倍加白朮條芩艾葉安胎清熱為主如胎氣上衝急用苧麻根艾葉煎湯磨檳榔服之宜四物湯大進以救之一麻已出不思飲食者蓋緣內蘊積熱胃氣不行宜四物湯加山楂神麯砂仁一二服則脾動而思食一麻疹初起嘔吐者胃有停痰下泄者內無積滯咳嗽者毒傳於肺皮毛受症三者全為順症三者缺一則色紫皮紅目赤淚流喘急腹脹為不治急以涼膈散速進利庶可保全一麻症出見一日而又沒者是為風寒所沖麻毒內攻若不急治癢爛而死宜用清毒散一服熱退睡安如見三日退後有被風寒之症消毒飲亦妙麻疹死症訣曰已沒渾身熱不退昏沉恍惚語乖張飲食不進舌胎白失智尋衣與摸床元氣精神魂懶散一魂尚爾去飄揚逢斯強發求全藥任是神仙莫主張予治麻症始出類傷風寒熱頭痛咳嗽熱甚目赤頰紅一二日內出者輕必須解表忌見風寒葷腥厚味鮮物或一犯之恐生痰咳變成驚搐不可治矣初起吐瀉變成者順霍亂者逆欲出不出危亡立至升麻葛根湯治疹子初起發熱方見前痘疹參蘇飲治疹出而嗽不止人參紫蘇廣皮枳殼茯苓前胡乾葛連翹麥冬貝母黃芩燈心引水煎服五苓散四苓散六一散方並見痘疹防風通聖散治同上方見痘疹臨症加減燈心引水煎服化斑湯治大渴不止乾嘔知母一錢甘草三分人參石膏淡竹葉各二分嘔甚加竹茹水煎溫服黃連解毒湯治水穀不化大熱泄瀉黃連黃柏黃芩梔子枳殼燈心引水煎服涼膈散治同上兼腹脹滿胸高黃芩連翹梔子薄荷大黃朴硝淡竹葉甘草姜一片水煎溫服夫治麻疹與治痘不同痘症辨寒熱熱症固宜清寒症用補藥不外參耆丁桂峻熱之品麻症多熱專用石膏升麻葛根黃芩黃連梔子桔梗之類且補藥止於四物湯用之耳桂朮參耆百無一二咳為本症咳甚者參蘇飲不咳者難治吐瀉兼全不藥而自愈葉瀉甚者專用五苓解毒湯主之庶可無危矣夫吐咳瀉三者缺一宜輕清和解若三者俱無必目赤皮紅腹脹氣促急宜涼膈散主之以通利否則束手待斃而已治麻者宜盡心於涼藥中求也增述附後痘疹虛症禁用藥性抄證治大還聖蒼氏增述蟬蛻能開通肌竅恐成表虛耗泄元氣鼠黏子通肌滑竅外致表虛內動中氣恐成泄脫人牙性烈發表太過內動中氣外增潰爛紫草性寒誤用溏便白朮多用恐能燥濕使潤下之氣不行則痘難成漿茯苓豬苓燥濕滲泄能令水氣下行小便多用只恐津液耗散外不行漿內防發渴訶子龍骨枯礬皆能阻塞肌竅氣虛之症用此毒愈不能進前雖能澀泄甚不可施治虛症之泄瀉只以補益為善車前滑石性猛利水極速易傷脾胃脾土一傷則中氣必敗而塌陷繼之內攻外剝百變俱生山梔性寒降火虛症便赤必非實熱大黃盪滌汙穢耗削胃氣性寒潤下雖熱渴便實皆不可用生地性寒涼血亦能潤腸枳殼下氣寬腸多用則瀉乾葛療表熱性涼外防表虛內恐傷胃況太涼則痘不長烏梅酸收砂仁散氣山楂散血解結多用則內虛半夏性悍多用則消渴麻黃開竅走泄恐成表虛氣脫麻疹辨疑賦見證治大還幼幼近編麻雖胎毒多帶時行氣候暄熱傳染而成其發也與痘相類其變也比痘匪輕先起於陽後歸於陰毒盛於脾熱流於心藏府之傷肺則尤甚始終之變腎則無症初則發熱有類傷寒眼胞困倦而難起鼻流清涕而不幹夾鼻脈紫烏輪火摶遍身俱熱惟耳獨寒咳嗽少食煩渴難安邪目視之隱隱皮膚之下以手摸之磊磊肌肉之間其形若疥其色若丹出見三日漸沒為安隨出隨沒喘急須防根窠若腫兮疹而兼癮皮膚如赤兮疹尤夾斑似錦而明兮不藥而愈如煤而黑兮百無一痊麻疹既出調理甚難坐臥欲暖飲食宜淡咳嗽涎沫不禁酸鹹忽生喘急肺受風寒心脾火灼口舌生瘡肺胃蘊熱津液常干有此變症治法不同微汗毒解熱勢少凶二便清調氣行無滯腠理拂鬱兮即當發散腸胃秘結兮急與疏通鼻衄者不必憂治邪從衄解自利者不必遽止毒以利松麻後多痢兮熱毒移於大腸咳嗽喉痛兮痰熱滯於心胸口渴心煩法在生津養血飲食減少治宜調胃和中餘症無常臨期變通此則麻之大旨妙在乎神通麻疹輕重要訣或熱或退五六日而後出者輕淡紅滋潤頭面勻淨而多者輕發透三日而漸沒者輕頭面不出者重紫紅暗燥者重咽喉腫痛不食者重冒風沒早者重移熱大腸變痢者重黑暗乾枯一出即沒者不治鼻扇口張目無神者不治鼻青糞黑者不治氣喘心前喘者不治麻後牙疳臭爛者不治按西河泡湯砂糖調服兼可治疹後痢麻疹附余夫麻即疹也以疹出如麻成朵痘出如豆成粒皆象其形而名之也麻疹之與痘瘡始似而終殊形同而症異痘瘡發於五臟麻疹發於六腑臟屬陰陰主血故痘有形而有汁腑屬陽陽主氣故疹有形而無漿然陽熱太盛則陰分受其煎熬故血多虛耗所以治法先發散行氣而後滋陰補血凡動氣燥悍之藥皆不可下也凡看麻疹之法多於耳後項上腰眼先見其頂尖而不長其形小而勻淨其色紅亮者吉若色紫紅乾燥暗晦乃火盛毒熾宜六一散解之後以四物換生地加柴胡黃芩乾葛紅花牛蒡連翹之類滋陰涼血而熱自除所謂養陰退陽之義也色黑者熱毒尤甚乃十死一生之症也用解毒湯合梔子仁湯一疹屬陽乃六腑之毒惟重於脾肺二經以肺主皮毛脾主肌肉故發熱時即見咳嗽聲重鼻涕者肺之毒散也泄瀉者脾經之毒去也如無上症者重一發熱之初憎寒壯熱鼻流清涕身體疼痛嘔吐泄瀉咳嗽氣急腮紅眼倦眼胞與面俱腫其淚汪汪烏輪紅色夾鼻六腑部分色見紅紫即是麻候宜避風寒用升麻葛根湯加紫蘇表汗之得汗則皮膚通暢腠理開豁而麻疹易出也於發散藥中加蔥白生薑使孔竅中微汗潤澤庶免熱閉發搐之症一疹用藥必先明其歲氣如時令溫暖以辛涼之藥發之暄熱以辛寒之藥發之大寒以辛熱發之時寒時熱以辛平發之一發熱咳嗽之時既明麻疹有出不快者用麻黃湯羌活湯消毒飲發散解毒之劑外芫荽酒糟蒸熱擦之自頭上至足為齊頭面愈多者為佳若遲延日久不能出則腹脹氣喘悶亂煩躁而死矣一凡麻疹出後見風沒早未清爽者宜消毒飲合升麻湯熱服雖不復出亦尋愈矣有麻出三日不沒者乃內有實熱宜四物湯加清利之藥則熱自解而麻自消矣風寒外湊疹停肌腠宜荊芥葛根防風蘇葉牛蒡連翹蟬蛻玄參全蠍生薑一發熱之時遍身汗出者此毒從汗解且玄府開而疹易出也有鼻中血出者此毒從血解俱不宜遽止若汗出太多血出不止此又火逼太過致血液妄行也恐氣血頓虛宜消毒飲加黃芩連翹生地丹皮玄參麥冬血出不止用當歸生地茅花丹皮黃芩梔子犀角一發熱之時或吐或瀉此皆火邪內逼毒氣上行則葉下行則瀉也不可遽止所謂解從吐解毒以利松也吐甚者二陳湯加石膏竹茹瀉甚升麻葛根湯加茯苓滑石一麻疹出時咽喉腫痛不能飲食此毒火拂鬱上熏咽喉也宜甘桔湯加連翹牛蒡子玄參荊芥一疹已出反沒由外感風寒內傷生冷抑鬱毒氣變為渾身青紫煩躁悶亂喘急腹痛毒成內攻急用加減麻黃湯遲則不救一麻疹一日三潮隨出隨沒者以麻疹屬陽遇三陽則發遇三陰則隱也一疹正出肚疼泄瀉若氣喘腹脹此毒未盡而傳於三陰也宜升麻葛根湯加荊芥滑石木通或發熱時過飲寒涼多食冷物而致者宜平胃散加砂仁焦術一疹初見欲發不發隱隱欲伏熱盛煩躁疹色乾紅焦紫此因邪抑郁毒將內攻也急用升麻葛根湯加荊芥蟬蛻蘇葉防風黏子木通一疹遍身既出而猶怫怫煩熱頻作嘔吐者此毒熱未盡留連於肺胃間也宜消毒飲加連翹升麻地骨皮知母石膏大便秘微加大黃一疹已收反渾身發熱晝夜不止此毒未盡解而陰血傷也消毒飲合四物湯加玄參連翹知母丹皮滑石甘草一疹發熱咳嗽三五日不出者用化毒湯外以胡荽子炒熱以薄綿包熨之一疹熱盛譫語小便赤澀者導赤散用生通甘等藥煩躁多渴者犀角化斑湯用荊防甘玄桔翹石知等味一疹狀如蚊蚤所咬色黑者此毒盛也宜山梔子湯一疹毒氣入胃變黑眼赤喉痛口舌生瘡泄瀉宜黃連杏湯用陳麻黃殼葛等品一疹出後聲啞不出或喘或咳或身熱不退致日久不愈者此熱毒未盡解肺金受傷也宜清金降火用知母貝母天冬麥冬骨皮丹皮生地芍藥當歸玄參連翹片芩瓜蔞仁一疹收後餘毒未盡日夜煩躁狂亂譫妄者乃餘毒蓄心包也辰砂益元散燈心黃連湯下一麻後瀉痢者乃積熱移於大腸宜益元散加生地木通芩連白芍或香連丸之類一麻後牙疳紅腫者清胃湯合甘桔湯加大力荊芥玄參胃爛者不治之症也一麻後痰嗽不止乃痰熱留於心胸四物合二陳加瓜蔞桔梗五味子渴加麥冬枳殼喘加蘇子桑皮一孕婦出麻以四物湯加白朮條芩艾葉砂仁以安胎清熱為主則胎不動而麻疹自愈矣若正出之時不進飲食者但得麻色淡紅潤澤亦無害也乃熱毒未解內蘊實熱故不食耳麻退不食者用四物湯加神麯砂仁一二劑自能食矣一凡出麻疹之時大忌葷腥生冷宜避風寒水濕苟有不謹最為深患戒之慎之辨痘夾丹疹與麻疹不同抄證治大還夫痘毒麻毒各有不同蓋痘毒出於臟麻出於腑臟屬陰陰主血故痘有形而有汁腑屬陽陽主氣故疹有形而無汁此皆中於有生之淫火本非尋常併發者惟痘出之時或風寒閉塞腠理或熱毒壅遏不得發越熱氣擊動藏府故並出耳此亦不順之症也錢氏云痘只出一般者善凡痘已見形其間碎密若瘡子者夾疹也此由火毒薰灼於中故使疹夾出於外也痘當從外解疹當從內解如痘內夾出丹疹不必治之當以托痘為主痘出而疹自淡矣若疹重者亦急宜解毒使疹子消散痘亦早得單成宜消毒飲加升麻玄參酒芩並黏荊甘防若疹不退者凶周慎齋云痘夾斑疹是表實風熱鬱於血分宜蘇葛湯倍前胡桔梗加羌活防風荊芥蟬蛻紅花連翹牛蒡子使邪從表散若過用寒涼則血凝氣滯陰無陽生而變黑矣邵公云痘夾班宜麻黃葛根湯解之而疹自退痘毒辨痘毒者因痘瘡毒盛之時失於解利毒氣壅遏肌肉外不得以泄於肌膚內無由入於藏府滯於肌肉故發癰腫也貫漿時發者名痘毒靨後發者名餘毒痘自唇四圍靨起循序而下必無餘毒若間斷而靨或靨時痘根尚有一絲紅暈此毒化漿未盡必發餘毒毒發則氣得以外泄肌表故得保全然須分虛實調治若精神倦怠飲食不貪宜參耆白朮甘草銀花白芷內托之若面赤便秘燥渴壯熱驚叫宜大連翹飲用歸芍防滑柴連通芩防梔車蒡脫草等品人參解毒湯解之用參防羌獨柴前荊銀花芎茯殼桔草姜外用羊脂膏敷之若毒遊走不定此元氣虛竭不能拘制其毒急宜內托亦當留一處出膿以泄其毒他處以藥敷之若發熱之時即見毒此名報毒切忌敷治痘胖而毒自消若誤用敷貼之藥毒必復入而痘反重矣又毒發骨節間須用移毒神丹移下一二寸不在骨節間出膿即免殘疾之患矣邵公云痘後發癰皆當發不發不當補過補致毒壅滯宜分虛實用藥虛者精神倦怠食少微熱腫處不疼宜內托散加白芷銀花木香膿流清水潰瘍不斂大補湯加白芷銀花外敷生肌散實者壯便燥煩渴叫痛大連翹飲外敷必勝膏餘毒不止於癰腫痘有遲延日久而起不圓胖靨既平之際或發癰腫人固知為餘毒而用大連翹敗毒散歸陳芷芍甲乳沒銀花貝防角針天花人參敗毒湯以解利之矣不知氣高而喘息作聲掀胸抬肚者餘毒之在肺也痰涎稠黏咬牙戛齒泄瀉不止口臭者餘毒之在脾胃也盜汗熱不退渴者餘毒之在心也夢中多驚餘毒之在肝也耳骫尚熱餘毒之在腎也眼合不開身腫不消壯熱不清鬱鬱不樂諸經皆有餘毒也豈可獨以焮發於外為餘毒而於此反慢不加省哉周慎齋云痘癰宜補氣血若面上溫疤遍體發毒宜保元四物加銀花連翹之類陳三農云七日前生毒者凡瘡未痊或初發疤處肌肉虛毒受氣血相傳故從虛處發出也其毒濕潤者為氣血俱盛枯燥乾紅氣血俱弱也王氏移毒神丹治痘毒發於節骱用此截搽半截毒即移下白及一兩六錢紅藥子一兩如無以紫花地丁代按濟時全書云即紅花子也硃砂雄黃輕粉各一錢烏骨雞骨煅灰一錢大黃五倍各二錢牙皂七分共為末醋調敷之羊脂膏秘傳治痘毒陳羊油一錢巴豆三錢同熬至豆黑去豆入香油二三滴塗腫上濕爛處用三稜白果肉搗敷又方蔥白搗爛入蜜和勻作薄餅縛腫處名必勝膏糯草灰散治痘後餘毒神效糯草灰不拘多少將滾湯淋去鹹水以淡灰掩患處生肌散治疳蝕不斂並痘後膿血雜流不收等瘡骨皮黃連黃柏五倍甘草共為細末乾摻一方加大貝二錢白芷赤石脂白及各一錢龍骨五分豬骨髓調貼亦名生肌散趙氏生肌散治癰潰成坑見骨赤石脂伏龍肝輕粉杭粉炒黃柏血竭各一錢陀僧二錢黃丹八分乳香沒藥各三分發灰五分冰片三釐共為細末敷摻解毒透斑湯保赤治麻痘初熱如時令不寒不熱以此辛平之藥發之升麻葛根羌活防風荊芥柴胡前胡人參桔梗連翹大力赤芍甘草蟬蛻淡竹葉時令溫暖加石膏知母木通去羌活人參時令暄熱加石膏知母玄參山梔黃芩去羌活升麻人參時令大寒加桂枝麻黃去人參葛根升麻前胡柴胡連翹用前藥發不出升麻麻黃俱用酒洗加人中黃牛蒡子蟬蛻水煎服玄參解毒湯治麻痘紫赤乾燥暗晦玄參升麻葛根焦梔仁石膏知母荊芥甘草桔梗生地木通黑暗加人中黃便秘加大黃腹脹加滑石化毒湯治疹一齊湧出色似錦紋玄參知母石膏連翹葶藶子荊芥升麻廣皮甘草淡竹葉麻疹不出方麻黃一兩去節全蠍二錢人中黃二兩大人用三錢小兒錢半蔥頭湯送下又方治痧疹沒能令即出牛黃冰片各一分麝香分半硃砂天黃各五分天竺黃五分殭蠶薄荷各三分薄荷湯下五分化斑解毒湯治痧毒未盡怫怫煩熱頻頻嘔吐連綿不收玄參知母石膏人中黃升麻大青大力淡竹葉煎服加減麻黃湯治感冒風寒毒返內攻喘急悶亂腹痛渾身青紫麻黃升麻俱酒洗荊芥大力蟬蛻人中黃疹發不出效方櫻桃核打碎煎湯飲之升麻解肌湯保赤治疹欲出不出壯熱煩躁或乾紅隱伏不起或為風寒所襲早沒升麻葛根赤藥蘇葉桔梗荊芥蟬蛻甘草木通天氣嚴寒加麻黃見風沒早肚腹膨脹加大力滑石犀角解毒養榮湯治疹退大熱不止當歸白芍生地川芎玄參荊芥丹皮黃芩芩連解毒湯治疹後下血黃芩黃連地榆犀角生地芍藥當歸荊芥木通水煎服解毒湯治疹後熱毒未盡留鬱於心脾口疳腐爛升麻芍藥生地木通黃芩連翹玄參甘草桔梗荊芥大力薄荷消斑飲治熱退疹不退此內熱未平也升麻玄參荊芥鼠黏芍藥甘草梔子仁湯治疹狀如蚊咬色黑者此毒盛也梔子蘚皮赤芍升麻寒水石甘草紫草薄荷黃連杏仁湯治疹毒氣入胃變黑眼赤喉痛口舌生瘡泄瀉黃連杏仁陳皮麻黃枳殼葛根加減升麻湯治水痘赤痘麻痘疹升麻葛根芍藥甘草防風桔梗紫蘇蒼朮廣皮枳殼柴胡薑棗煎服水痘赤痘即此一服本方不用加減見疹熱不退加玄參嘔吐加藿香瀉甚者去蒼朮加訶子肉果又方治痘後餘毒人參茯苓銀花犀角各三錢甘草錢半羚羊角一錢珍珠八分共為末蜜丸每服一錢日二服又方出證治大還治痧後下積滯川連一兩酒炒升麻七分乾葛八錢甘草四錢黃芩八錢白芍八錢酒炒滑石一兩共為末山藥粉和丸白湯下三四錢又方治痧後口瘡大黃牛糞尖一個煅明礬五分冰片分半皮硝一錢硼砂三錢銅青三分共研末以鵝毛管吹患上又方治痧後瘧鱉甲煅楂肉各二錢橘紅川貝各三錢竹葉十五片炙甘一分麥冬三錢去心知母錢二分茯苓二錢葛根錢半柴胡一錢如不渴去知母渴甚加石膏五錢蘇葛散痘疹見點用紫蘇葛根桔梗前胡各二錢甘草五分疏表加荊芥防風便秘加枳殼當歸見標蘇葛減半熱盛加連翹小便不利加木通大便不利加玄明粉或酒蒸大黃去一二次不妨渴加石膏瀉加升麻吐不用升麻恐防咽喉痛吐加廣皮心煩加連翹喉痛加牛蒡玄參血熱加紅花當歸微紫便燥加生地紫草身痛加羌活頭痛加川芎腹痛加山楂前胡有起發之功前不可缺渴甚加六一散燈心湯下水痘景岳全書麻疹門後凡出水痘先十數點一日後其頂尖上有水泡二日二日又出漸多四日渾身作癢瘡頭皆破微加壯熱即收矣但有此疾須忌發物七八日乃痊一水痘亦有類傷寒之狀身熱二三日而出者或咳嗽面赤眼光如水或噴嚏或流涕但與正痘不同易出亦易靨治以清熱解毒為主
